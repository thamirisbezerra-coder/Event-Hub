                                        <div className="space-y-3">
                                            {members.map(m => (
                                                <div key={m.id} className="flex justify-between items-center p-3 border rounded-xl transition-all bg-white border-gray-100 hover:shadow-sm">
                                                    <div className="flex items-center gap-4 w-full mr-4">
                                                        <div className="relative group cursor-pointer shrink-0">
                                                            <Avatar member={m}/>
                                                            <div className="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-white"><Camera size={14}/></div>
                                                            <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" onChange={(e) => handleMemberPhotoUpdate(e, m.id)}/>
                                                        </div>
                                                        <div className="flex-1">
                                                            {editingMemberId === m.id ? (
                                                                <div className="flex flex-col gap-2 w-full">
                                                                    <div className="flex items-center gap-2">
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="Nome" value={editName} onChange={e=>setEditName(e.target.value)} autoFocus/>
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="E-mail" value={editEmail} onChange={e=>setEditEmail(e.target.value)}/>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="Função" value={editRole} onChange={e=>setEditRole(e.target.value)}/>
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="Senha de Acesso" value={editPassword} onChange={e=>setEditPassword(e.target.value)}/>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div>
                                                                    <p className="text-sm font-bold text-gray-800 flex items-center gap-2">
                                                                        {m.name} 
                                                                        {m.role === 'Temporário' && <span className="bg-amber-100 text-amber-700 text-[9px] px-1.5 py-0.5 rounded uppercase font-bold">Temp</span>}
                                                                    </p>
                                                                    <div className="text-[10px] mt-1 space-y-1">
                                                                        <p className="text-gray-500">{m.email || 'Sem e-mail'} • {m.role}</p>
                                                                        {m.password ? (
                                                                            <p className="flex items-center gap-1 text-emerald-700 font-bold bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded w-fit">
                                                                                <Lock size={10}/> Senha: {m.password}
                                                                            </p>
                                                                        ) : (
                                                                            <p className="text-gray-400 italic">Sem senha (acesso livre)</p>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 shrink-0">
                                                        {editingMemberId === m.id ? 
                                                            <button onClick={saveMember} className="w-8 h-8 flex items-center justify-center bg-green-50 text-green-600 rounded-lg hover:bg-green-100"><Check size={16}/></button> : 
                                                            <button onClick={() => startEditingMember(m)} className="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg"><Edit2 size={16}/></button>
                                                        }
                                                        <button onClick={() => onDeleteMember(m.id)} className="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-gray-300 hover:text-red-500 hover:bg-red-50" title="Excluir Definitivamente">
                                                            <Trash2 size={16}/>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'security' && (
                                    <div className="space-y-8 animate-in">
                                        <div>
                                            <h4 className="text-lg font-bold text-gray-800 mb-4">Segurança & Sistema</h4>
                                            <p className="text-sm text-gray-500 mb-6">Controle de acesso e integrações.</p>
                                        
                                            <div className="space-y-6">
                                                <div className="p-5 border border-amber-200 bg-amber-50 rounded-2xl">
                                                    <div className="flex items-start gap-3 mb-4"><div className="p-2 bg-amber-100 rounded-lg text-amber-600"><Lock size={20}/></div><div><h5 className="font-bold text-amber-900 text-sm">Senha do Gestor</h5><p className="text-xs text-amber-700/70">Senha usada para acessar esta área restrita.</p></div></div>
                                                    <div className="flex gap-2"><input type="password" value={newManagerPassword} onChange={e=>setNewManagerPassword(e.target.value)} className="flex-1 p-2.5 text-sm border border-amber-200 rounded-xl bg-white outline-none focus:ring-2 focus:ring-amber-200" placeholder="Nova senha..."/><button onClick={handleUpdateManagerPassword} className="bg-amber-600 text-white px-4 rounded-xl text-xs font-bold hover:bg-amber-700 shadow-sm">Atualizar</button></div>
                                                </div>

                                                <div className="p-5 border border-gray-100 bg-white rounded-2xl shadow-sm">
                                                    <div className="flex items-start gap-3 mb-4"><div className="p-2 bg-purple-100 rounded-lg text-purple-600"><Sparkles size={20}/></div><div><h5 className="font-bold text-gray-800 text-sm">Inteligência Artificial (Gemini)</h5><p className="text-xs text-gray-500">Chave da API para o assistente virtual.</p></div></div>
                                                    <div className="flex gap-2"><input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} className="flex-1 p-2.5 text-sm border rounded-xl outline-none focus:border-purple-500 bg-gray-50" placeholder="Cole sua API Key aqui..."/><button onClick={handleSaveKey} className="bg-purple-600 text-white px-4 rounded-xl text-xs font-bold hover:bg-purple-700 shadow-sm">Salvar</button></div>
                                                </div>

                                                <div className="p-5 border border-gray-100 bg-white rounded-2xl shadow-sm">
                                                    <div className="flex items-start gap-3 mb-4"><div className="p-2 bg-blue-100 rounded-lg text-blue-600"><Database size={20}/></div><div><h5 className="font-bold text-gray-800 text-sm">Sincronização de Dados</h5><p className="text-xs text-gray-500">ID único para compartilhar dados entre dispositivos.</p></div></div>
                                                    <div className="flex gap-2"><input type="text" value={customId} onChange={e=>setCustomId(e.target.value)} className="flex-1 p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-gray-50 font-mono text-gray-600" placeholder="ID da Aplicação"/><button onClick={handleSaveAppId} className="bg-blue-900 text-white px-4 rounded-xl text-xs font-bold hover:bg-blue-800 shadow-sm">Conectar</button></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </Modal>
            );
        };

        const NewEventModal = ({ isOpen, onClose, onCreate, members }) => {
            const [title, setTitle] = useState('');
            const [location, setLocation] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [driveLink, setDriveLink] = useState('');
            const [isSingleDay, setIsSingleDay] = useState(false);
            const [responsible, setResponsible] = useState('');
            const [team, setTeam] = useState([]);
            const [coverIcon, setCoverIcon] = useState('star');
            const [selectedOptionalTasks, setSelectedOptionalTasks] = useState([]);
            
            useEffect(() => { if (isSingleDay) setEndDate(startDate); }, [isSingleDay, startDate]);
            if (!isOpen) return null;
            
            const toggleTask = (taskId) => { if (selectedOptionalTasks.includes(taskId)) setSelectedOptionalTasks(prev => prev.filter(id => id !== taskId)); else setSelectedOptionalTasks(prev => [...prev, taskId]); };
            const toggleTeamMember = (memberId) => { if (team.includes(memberId)) setTeam(prev => prev.filter(id => id !== memberId)); else setTeam(prev => [...prev, memberId]); };
            
            const handleSubmit = () => {
                if (!title || !startDate || !responsible) { alert("Preencha Nome, Data e Responsável."); return; }
                const newEventId = Date.now().toString();
                const initialTasksToCreate = OPTIONAL_STARTUP_TASKS
                    .filter(t => selectedOptionalTasks.includes(t.id))
                    .map((t, index) => ({ 
                        id: (Date.now() + index + 1).toString(), eventId: newEventId, text: t.text, category: t.category, 
                        phase: t.phase, priority: 'medium', status: 'planning', cost: 0, 
                        responsible: members.find(m => m.id === responsible) || null,
                        messages: [], support: [], subtasks: [], transferHistory: [], order: Date.now() + index 
                    }));

                const formatDate = (d) => { if (!d) return ''; const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; }
                const dateRange = isSingleDay || !endDate ? formatDate(startDate) : `${formatDate(startDate)} - ${formatDate(endDate)}`;
                
                onCreate({ 
                    id: newEventId, title, location: location || 'Local a definir', driveLink, startDate, 
                    endDate: isSingleDay ? startDate : endDate, dateRange, responsibleId: responsible, 
                    teamIds: team, categories: DEFAULT_CATEGORIES, agenda: [], coverIcon 
                }, initialTasksToCreate);
                onClose(); 
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Novo Evento" hideHeader={true} maxWidth="max-w-3xl">
                    <div className="bg-gradient-to-r from-blue-900 via-indigo-800 to-purple-900 p-8 text-white relative overflow-hidden"><div className="absolute top-0 right-0 p-4 opacity-10 transform translate-x-4 -translate-y-4"><Rocket size={120} /></div><h2 className="text-3xl font-extrabold mb-2 flex items-center gap-3 relative z-10"><Sparkles className="text-amber-400 animate-pulse" /> Criar Novo Evento</h2><p className="text-blue-100 text-sm max-w-md relative z-10 opacity-90">Prepare o terreno para um evento inesquecível. Comece definindo os detalhes principais abaixo.</p></div>
                    <div className="p-8 space-y-6">
                        <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nome do Evento *</label><input className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 text-sm outline-none focus:border-blue-500" placeholder="Ex: Lançamento 2026" value={title} onChange={e=>setTitle(e.target.value)} autoFocus/></div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Local</label><input className="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 text-sm outline-none" placeholder="Cidade/Estado" value={location} onChange={e=>setLocation(e.target.value)}/></div>
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1 flex items-center gap-1">Link da Pasta <HardDrive size={12} className="text-gray-400"/></label><input className="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 text-sm outline-none" placeholder="https://drive.google.com/..." value={driveLink} onChange={e=>setDriveLink(e.target.value)}/></div>
                        </div>

                        <div className="space-y-3"><div className="flex items-center justify-between"><label className="block text-xs font-bold text-gray-500 uppercase">Período *</label><label className="flex items-center gap-2 text-xs font-bold text-blue-600 cursor-pointer"><input type="checkbox" checked={isSingleDay} onChange={e => setIsSingleDay(e.target.checked)}/> Dia único?</label></div><div className="flex gap-2"><input type="date" className="w-full p-3 border rounded-xl bg-gray-50 text-sm" value={startDate} onChange={e=>setStartDate(e.target.value)}/>{!isSingleDay && <input type="date" className="w-full p-3 border rounded-xl bg-gray-50 text-sm" value={endDate} onChange={e=>setEndDate(e.target.value)}/>}</div></div>
                        
                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                            <label className="block text-[10px] font-bold text-gray-500 uppercase mb-3">Ícone da Capa do Evento</label>
                            <div className="grid grid-cols-6 sm:grid-cols-10 gap-2 max-h-32 overflow-y-auto p-1 custom-scrollbar">
                                {COVER_ICON_KEYS.map(key => {
                                    const Icon = COVER_ICONS_MAP[key];
                                    return (
                                        <button 
                                            key={key} 
                                            onClick={() => setCoverIcon(key)}
                                            className={`p-2.5 rounded-xl flex items-center justify-center transition-all ${coverIcon === key ? 'bg-blue-100 text-blue-700 ring-2 ring-blue-500 shadow-sm' : 'bg-white text-gray-400 border border-gray-200 hover:bg-gray-100 hover:text-gray-600'}`}
                                            title={key}
                                        >
                                            <Icon size={18} />
                                        </button>
                                    )
                                })}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2 border-t border-gray-100">
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-2">Responsável *</label><div className="space-y-2 max-h-40 overflow-y-auto custom-scrollbar">{members.map(m => (<div key={m.id} onClick={() => setResponsible(m.id)} className={`flex items-center gap-3 p-2 rounded-lg cursor-pointer border transition-all ${responsible === m.id ? 'bg-blue-50 border-blue-500' : 'bg-white border-gray-100 hover:bg-gray-50'}`}><Avatar member={m} size="w-8 h-8"/><span className="text-xs font-bold flex-1">{m.name}</span>{responsible === m.id && <Check size={14} className="text-blue-600"/>}</div>))}</div></div>
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-2">Equipe</label><div className="flex flex-wrap gap-2">{members.filter(m => m.id !== responsible).map(m => (<button key={m.id} onClick={() => toggleTeamMember(m.id)} className={`flex items-center gap-2 p-1.5 rounded-lg border text-xs ${team.includes(m.id) ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-gray-200'}`}><Avatar member={m} size="w-5 h-5"/> {m.name}</button>))}</div></div>
                        </div>
                        <div className="pt-2 border-t border-gray-100"><label className="block text-xs font-bold text-gray-500 uppercase mb-3">Tarefas Iniciais (Opcional)</label><div className="bg-gray-50 border border-gray-200 rounded-xl p-4 max-h-40 overflow-y-auto custom-scrollbar grid grid-cols-1 md:grid-cols-2 gap-3">{OPTIONAL_STARTUP_TASKS.map(task => (<label key={task.id} className={`flex items-center gap-2 p-2 rounded-lg border cursor-pointer transition-all ${selectedOptionalTasks.includes(task.id) ? 'bg-white border-blue-300 shadow-sm' : 'border-transparent'}`}><input type="checkbox" className="rounded text-blue-600" checked={selectedOptionalTasks.includes(task.id)} onChange={() => toggleTask(task.id)}/><span className="text-xs text-gray-700">{task.text}</span></label>))}</div></div>
                        <button onClick={handleSubmit} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-xl font-bold hover:shadow-lg animate-shine bg-[length:200%_auto]">Criar Evento</button>
                    </div>
                </Modal>
            );
        };

        const EditEventModal = ({ isOpen, onClose, event, onUpdate, onDelete, members }) => {
            const [title, setTitle] = useState(event?.title || '');
            const [startDate, setStartDate] = useState(event?.startDate || '');
            const [endDate, setEndDate] = useState(event?.endDate || '');
            const [location, setLocation] = useState(event?.location || '');
            const [driveLink, setDriveLink] = useState(event?.driveLink || '');
            const [cover, setCover] = useState(event?.coverUrl || '');
            const [coverIcon, setCoverIcon] = useState(event?.coverIcon || 'star');
            const [responsible, setResponsible] = useState(event?.responsibleId || '');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if(event) { 
                    setTitle(event.title || ''); setStartDate(event.startDate || ''); setEndDate(event.endDate || ''); 
                    setLocation(event.location || ''); setDriveLink(event.driveLink || ''); setCover(event.coverUrl || ''); 
                    setCoverIcon(event.coverIcon || 'star'); setResponsible(event.responsibleId || ''); 
                }
            }, [event]);

            if(!isOpen || !event) return null;

            const handleSave = () => { onUpdate(event.id, { title, startDate, endDate, location, driveLink, coverUrl: cover, coverIcon, responsibleId: responsible }); onClose(); };
            const handleCoverUpload = async (e) => { if(e.target.files[0]) { const url = await compressImage(e.target.files[0], 800); setCover(url); } };

            const getLocalDaysLeft = () => {
                if (!startDate) return 0;
                const [year, month, day] = startDate.split('-').map(Number);
                const target = new Date(year, month - 1, day);
                const today = new Date(); today.setHours(0,0,0,0);
                return Math.ceil((target - today) / (86400000));
            };
            const daysLeft = getLocalDaysLeft();
            const daysLeftText = daysLeft < 0 ? `Terminou há ${Math.abs(daysLeft)} dias` : daysLeft === 0 ? "É hoje!" : `Faltam ${daysLeft} dias`;
            const formatDate = (d) => { if (!d) return ''; const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Editar Evento">
                    <div className={`mb-4 p-3 rounded-xl text-center flex flex-col gap-1 ${daysLeft < 0 ? 'bg-gray-100 text-gray-600' : 'bg-blue-50 text-blue-700'}`}>
                        <span className="text-lg font-bold">{daysLeftText}</span>
                        <span className="text-xs font-normal opacity-80">{formatDate(startDate)} {endDate && endDate !== startDate ? ` - ${formatDate(endDate)}` : ''}{location ? ` • ${location}` : ''}</span>
                    </div>

                    <div className="space-y-4">
                        <div onClick={()=>fileInputRef.current.click()} className="h-32 bg-gray-100 rounded-xl flex items-center justify-center cursor-pointer overflow-hidden relative group border border-gray-200">
                            {cover ? <img src={cover} className="w-full h-full object-cover"/> : <span className="text-gray-400 font-bold">Alterar Imagem da Capa</span>}
                            <div className="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-white font-bold"><Camera size={24}/></div>
                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleCoverUpload}/>
                        </div>

                        <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nome do Evento</label><input className="w-full p-3 border rounded-xl font-bold text-gray-800" placeholder="Nome" value={title} onChange={e=>setTitle(e.target.value)}/></div>
                        
                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                            <label className="block text-[10px] font-bold text-gray-500 uppercase mb-3">Ícone da Capa</label>
                            <div className="grid grid-cols-6 sm:grid-cols-10 gap-2 max-h-32 overflow-y-auto p-1 custom-scrollbar">
                                {COVER_ICON_KEYS.map(key => {
                                    const Icon = COVER_ICONS_MAP[key];
                                    return (
                                        <button 
                                            key={key} 
                                            onClick={() => setCoverIcon(key)}
                                            className={`p-2.5 rounded-xl flex items-center justify-center transition-all ${coverIcon === key ? 'bg-blue-100 text-blue-700 ring-2 ring-blue-500 shadow-sm' : 'bg-white text-gray-400 border border-gray-200 hover:bg-gray-100 hover:text-gray-600'}`}
                                            title={key}
                                        >
                                            <Icon size={18} />
                                        </button>
                                    )
                                })}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Início</label><input type="date" className="w-full p-3 border rounded-xl text-sm" value={startDate} onChange={e=>setStartDate(e.target.value)}/></div>
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Fim</label><input type="date" className="w-full p-3 border rounded-xl text-sm" value={endDate} onChange={e=>setEndDate(e.target.value)}/></div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                             <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Localização</label><input className="w-full p-3 border rounded-xl text-sm" placeholder="Ex: São Paulo, SP" value={location} onChange={e=>setLocation(e.target.value)}/></div>
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1 flex items-center gap-1">Link do Drive <HardDrive size={12} className="text-gray-400"/></label><input className="w-full p-3 border rounded-xl text-sm" placeholder="https://drive.google.com/..." value={driveLink} onChange={e=>setDriveLink(e.target.value)}/></div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Responsável</label>
                            <select className="w-full p-3 border rounded-xl bg-white text-sm" value={responsible} onChange={(e) => setResponsible(e.target.value)}>
                                <option value="">Selecione...</option>
                                {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                        </div>
                        
                        <div className="flex gap-2 pt-2">
                            <button onClick={handleSave} className="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">Salvar</button>
                            {onDelete && (<button onClick={() => onDelete(event.id)} className="bg-red-50 text-red-600 p-3 rounded-xl font-bold hover:bg-red-100 transition-colors" title="Excluir Evento"><Trash2 size={20}/></button>)}
                        </div>
                    </div>
                </Modal>
            );
        };

        const NewTaskModal = ({ isOpen, onClose, eventCategories, onCreate, members, eventId }) => {
            const [text, setText] = useState('');
            const [category, setCategory] = useState(eventCategories[0]?.id || '');
            const [subcategoryId, setSubcategoryId] = useState('');
            const [phase, setPhase] = useState('pre');
            const [responsible, setResponsible] = useState('');
            const [support, setSupport] = useState([]);
            const [cost, setCost] = useState(0);

            const [quantity, setQuantity] = useState('');
            const [supplier, setSupplier] = useState('');
            const [nimbiId, setNimbiId] = useState('');
            const [deliveryDate, setDeliveryDate] = useState('');
            const [electrical, setElectrical] = useState(false); 
            const [kva, setKva] = useState('');
            const [voltage, setVoltage] = useState('');
            const [hydraulic, setHydraulic] = useState('');

            // Pega o objeto da categoria selecionada para ver as subcategorias
            const selectedCatObj = eventCategories.find(c => c.id === category);

            useEffect(() => {
                if(isOpen && category) {
                    if(selectedCatObj && selectedCatObj.responsibleId && !responsible) {
                        setResponsible(selectedCatObj.responsibleId);
                    }
                    // Reset subcategory if category changes and doesn't have it
                    if(!selectedCatObj?.subcategories?.some(s => s.id === subcategoryId)) {
                        setSubcategoryId('');
                    }
                }
            }, [category, isOpen]);

            if (!isOpen) return null;

            const handleCreate = () => {
                if (!text) return;
                const responsibleMember = members.find(m => m.id === responsible);
                const supportMembers = support.map(id => members.find(m => m.id === id)).filter(Boolean);

                onCreate({
                    id: Date.now(), eventId, text, category, subcategoryId: subcategoryId || null, phase,
                    responsible: responsibleMember || null, support: supportMembers,
                    status: 'planning', priority: 'medium', subtasks: [], messages: [], transferHistory: [],
                    cost: Number(cost), order: Date.now(),
                    quantity, supplier, nimbiId, deliveryDate, electrical, kva, voltage, hydraulic
                });
                
                setText(''); setResponsible(''); setSupport([]); setCost(0);
                setQuantity(''); setSupplier(''); setNimbiId(''); setDeliveryDate('');
                setElectrical(false); setKva(''); setVoltage(''); setHydraulic(''); setSubcategoryId('');
                onClose();
            };

            const toggleSupport = (id) => {
                if(support.includes(id)) setSupport(prev => prev.filter(s => s !== id));
                else setSupport(prev => [...prev, id]);
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Nova Tarefa">
                    <div className="p-6 space-y-4 max-h-[80vh] overflow-y-auto custom-scrollbar">
                        <input className="w-full p-3 border rounded-xl" placeholder="Descrição da Tarefa" value={text} onChange={e=>setText(e.target.value)} autoFocus/>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="text-xs font-bold text-gray-500 uppercase">Categoria Principal</label>
                                <select className="w-full p-2 border rounded-lg mt-1" value={category} onChange={e=>setCategory(e.target.value)}>{eventCategories.map(c=><option key={c.id} value={c.id}>{c.title}</option>)}</select>
                            </div>
                            <div><label className="text-xs font-bold text-gray-500 uppercase">Fase</label><select className="w-full p-2 border rounded-lg mt-1" value={phase} onChange={e=>setPhase(e.target.value)}><option value="pre">Pré-Evento</option><option value="during">Durante</option><option value="post">Pós-Evento</option></select></div>
                        </div>

                        {selectedCatObj && selectedCatObj.subcategories && selectedCatObj.subcategories.length > 0 && (
                            <div className="animate-in bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                                <label className="text-xs font-bold text-blue-800 uppercase flex items-center gap-1"><Layers size={14}/> Subcategoria (Opcional)</label>
                                <select className="w-full p-2 border border-blue-200 rounded-lg mt-1 bg-white" value={subcategoryId} onChange={e=>setSubcategoryId(e.target.value)}>
                                    <option value="">Geral (Sem subcategoria)</option>
                                    {selectedCatObj.subcategories.map(s => <option key={s.id} value={s.id}>{s.title}</option>)}
                                </select>
                            </div>
                        )}
                        
                        <div className="pt-2 border-t border-gray-100">
                             <p className="text-xs font-bold text-blue-600 uppercase mb-2">Detalhes Operacionais (Opcional)</p>
                             <div className="grid grid-cols-2 gap-3 mb-2">
                                <div><label className="text-xs font-bold text-gray-500">Qtd.</label><input type="number" className="w-full p-2 border rounded-lg" value={quantity} onChange={e=>setQuantity(e.target.value)}/></div>
                                <div><label className="text-xs font-bold text-gray-500">Custo (R$)</label><input type="number" className="w-full p-2 border rounded-lg" value={cost} onChange={e=>setCost(e.target.value)}/></div>
                             </div>
                             <div className="grid grid-cols-2 gap-3 mb-2">
                                <div><label className="text-xs font-bold text-gray-500">Fornecedor</label><input className="w-full p-2 border rounded-lg" value={supplier} onChange={e=>setSupplier(e.target.value)}/></div>
                                <div><label className="text-xs font-bold text-gray-500">ID Nimbi</label><input className="w-full p-2 border rounded-lg" value={nimbiId} onChange={e=>setNimbiId(e.target.value)}/></div>
                             </div>
                             <div className="mb-2"><label className="text-xs font-bold text-gray-500">Data/Hora Entrega (Prazo)</label><input type="datetime-local" className="w-full p-2 border rounded-lg" value={deliveryDate} onChange={e=>setDeliveryDate(e.target.value)}/></div>
                        </div>

                         <div className="pt-2 border-t border-gray-100">
                             <p className="text-xs font-bold text-blue-600 uppercase mb-2">Especificações Técnicas (Opcional)</p>
                             <div className="flex items-center gap-2 mb-2">
                                <input type="checkbox" id="elec" checked={electrical} onChange={e=>setElectrical(e.target.checked)} className="rounded text-blue-600"/>
                                <label htmlFor="elec" className="text-sm text-gray-700 font-bold">Necessita Elétrica?</label>
                             </div>
                             {electrical && (
                                <div className="grid grid-cols-2 gap-3 mb-2 animate-in pl-6 border-l-2 border-gray-100">
                                    <div><label className="text-xs font-bold text-gray-500">KVA</label><input className="w-full p-2 border rounded-lg" value={kva} onChange={e=>setKva(e.target.value)}/></div>
                                    <div><label className="text-xs font-bold text-gray-500">Tensão</label><input className="w-full p-2 border rounded-lg" value={voltage} onChange={e=>setVoltage(e.target.value)} placeholder="Ex: 220v"/></div>
                                </div>
                             )}
                             <div><label className="text-xs font-bold text-gray-500">Infos Hidráulica</label><input className="w-full p-2 border rounded-lg" placeholder="Ex: Ponto de água/esgoto" value={hydraulic} onChange={e=>setHydraulic(e.target.value)}/></div>
                        </div>

                        <div><label className="text-xs font-bold text-gray-500 uppercase">Responsável</label><select className="w-full p-2 border rounded-lg mt-1" value={responsible} onChange={e=>setResponsible(e.target.value)}><option value="">Selecione...</option>{members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
                        <div><label className="text-xs font-bold text-gray-500 uppercase mb-2 block">Apoio (Opcional)</label><div className="flex flex-wrap gap-2">{members.filter(m=>m.id!==responsible).map(m=><button key={m.id} onClick={()=>toggleSupport(m.id)} className={`p-1.5 rounded-full border-2 ${support.includes(m.id)?'border-blue-500':'border-transparent opacity-50'}`}><Avatar member={m} size="w-8 h-8"/></button>)}</div></div>
                        <button onClick={handleCreate} className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Adicionar Tarefa</button>
                    </div>
                </Modal>
            );
        };

        const BottomNav = ({ activeTab, onChangeTab, onAdd }) => (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-2 flex justify-between items-center z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button onClick={() => onChangeTab('dashboard')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'dashboard' ? 'text-blue-900' : 'text-gray-400'}`}><Home size={20} /><span className="text-[10px]">Início</span></button>
                <button onClick={() => onChangeTab('agenda')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'agenda' ? 'text-blue-900' : 'text-gray-400'}`}><CalendarIcon size={20} /><span className="text-[10px]">Agenda</span></button>
                <div className="relative -top-6"><button onClick={onAdd} className="w-14 h-14 bg-gradient-to-r from-blue-900 to-blue-800 rounded-full shadow-lg flex items-center justify-center text-white hover:scale-105 transition-transform"><Plus size={28} /></button></div>
                <button onClick={() => onChangeTab('team')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'team' ? 'text-blue-900' : 'text-gray-400'}`}><Users size={20} /><span className="text-[10px]">Equipe</span></button>
                <button onClick={() => onChangeTab('settings')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'settings' ? 'text-blue-900' : 'text-gray-400'}`}><Settings size={20} /><span className="text-[10px]">Ajustes</span></button>
            </div>
        );

        function App() {
            const [view, setView] = useState('dashboard');
            const [selectedEvent, setSelectedEvent] = useState(null);
            
            // Firebase States
            const [events, setEvents] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [members, setMembers] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [user, setUser] = useState(null);
            
            const [activeUserId, setActiveUserId] = useState(localStorage.getItem('eventhub_active_user_id') || null);
            
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [isNewEventOpen, setIsNewEventOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isCatSettingsOpen, setIsCatSettingsOpen] = useState(false);
            const [isNewTaskOpen, setIsNewTaskOpen] = useState(false);
            const [isAIOpen, setIsAIOpen] = useState(false);
            const [selectedWorkloadMember, setSelectedWorkloadMember] = useState(null);
            const [logo, setLogo] = useState(null);
            const [managerId, setManagerId] = useState('1'); 
            const [geminiKey, setGeminiKey] = useState('');
            const [managerPassword, setManagerPassword] = useState('1234');

            // 1. Inicia Auth
            useEffect(() => {
                if (!app) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth falhou:", e); }
                };
                initAuth();

                return onAuthStateChanged(auth, (u) => {
                    if (u) { setUser(u); } 
                    else { setUser(null); }
                });
            }, []);

            const currentUserMember = members.find(m => m.id === activeUserId) || null;

            // Filtra os eventos baseados no perfil do usuário
            const visibleEvents = useMemo(() => {
                if (!currentUserMember || currentUserMember.role !== 'Temporário') return events;
                return events.filter(e => e.responsibleId === currentUserMember.id || (e.teamIds && e.teamIds.includes(currentUserMember.id)));
            }, [events, currentUserMember]);

            // Filtra as tarefas baseadas nos eventos visíveis
            const visibleTasks = useMemo(() => {
                if (!currentUserMember || currentUserMember.role !== 'Temporário') return tasks;
                const visibleEventIds = visibleEvents.map(e => e.id);
                return tasks.filter(t => visibleEventIds.includes(t.eventId));
            }, [tasks, visibleEvents, currentUserMember]);

            // 2. Subscreve ao Firestore apenas se logado
            useEffect(() => {
                if(!user || !db) return;

                const unsubEvents = onSnapshot(getColPath('events'), (snap) => {
                    if (snap.empty && !localStorage.getItem('db_initialized')) {
                        INITIAL_MEMBERS.forEach(m => setDoc(getDocPath('members', m.id), m));
                        setDoc(getDocPath('config', 'main'), { managerId: '1', managerPassword: '1234' });
                        localStorage.setItem('db_initialized', 'true');
                    } else { setEvents(snap.docs.map(d => d.data())); }
                });
                const unsubTasks = onSnapshot(getColPath('tasks'), (snap) => setTasks(snap.docs.map(d => d.data())));
                const unsubMembers = onSnapshot(getColPath('members'), (snap) => setMembers(snap.docs.map(d => d.data())));
                const unsubSettings = onSnapshot(getDocPath('config', 'main'), (snap) => {
                    if(snap.exists()) {
                        const data = snap.data();
                        if(data.logo) setLogo(data.logo); if(data.managerId) setManagerId(data.managerId);
                        if(data.geminiKey) setGeminiKey(data.geminiKey); if(data.managerPassword) setManagerPassword(data.managerPassword);
                    }
                });
                const unsubNotifications = onSnapshot(getColPath('notifications'), (snap) => {
                    setNotifications(snap.docs.map(d => d.data()));
                });

                return () => { unsubEvents(); unsubTasks(); unsubMembers(); unsubSettings(); unsubNotifications(); };
            }, [user]);

            // --- Handlers Firestore ---
            const handleUpdateTask = (id, updates) => updateDoc(getDocPath('tasks', id), updates);
            const handleDeleteTask = (id) => deleteDoc(getDocPath('tasks', id));
            const handleCreateTask = (newTask) => {
                 setDoc(getDocPath('tasks', newTask.id), newTask);
                 if (newTask.responsible && newTask.responsible.id !== currentUserMember?.id) {
                     handleCreateNotification({
                         userId: newTask.responsible.id,
                         title: "Nova Tarefa Atribuída",
                         text: `${currentUserMember?.name || 'Alguém'} te atribuiu a tarefa "${newTask.text}".`,
                         taskId: newTask.id,
                         read: false,
                         createdAt: new Date().toISOString()
                     });
                 }
            };
            const handleUpdateEvent = (id, updates) => updateDoc(getDocPath('events', id), updates);
            const handleCreateEvent = (newEvent, newTasks) => { setDoc(getDocPath('events', newEvent.id), newEvent); newTasks.forEach(t => setDoc(getDocPath('tasks', t.id), t)); };
            const handleDeleteEvent = (eventId) => {
                if(confirm("Tem certeza que deseja excluir este evento e todas as suas tarefas?")) {
                    deleteDoc(getDocPath('events', eventId));
                    tasks.filter(t => t.eventId === eventId).forEach(t => deleteDoc(getDocPath('tasks', t.id)));
                    setView('dashboard'); setSelectedEvent(null);
                }
            };
            const handleUpdateMember = (id, updates) => updateDoc(getDocPath('members', id), updates);
            const handleAddMember = async (newMember) => {
                return setDoc(getDocPath('members', newMember.id), newMember);
            };
            
            // EXCLUSÃO REAL DE MEMBRO (HARD DELETE)
            const handleDeleteMember = (id) => {
                if(confirm("Tem certeza que deseja EXCLUIR este membro definitivamente do sistema?")) {
                    deleteDoc(getDocPath('members', id));
                    if (activeUserId === id) {
                        handleLogout();
                    }
                }
            };

            const handleCreateNotification = (notif) => {
                const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                setDoc(getDocPath('notifications', id), { id, ...notif });
            };
            const handleMarkAsReadNotification = (id) => updateDoc(getDocPath('notifications', id), { read: true });
            const handleClearAllNotifications = () => {
                notifications.filter(n => n.userId === currentUserMember?.id).forEach(n => deleteDoc(getDocPath('notifications', n.id)));
            };

            const handleUpdateLogo = (url) => setDoc(getDocPath('config', 'main'), { logo: url }, { merge: true });
            const handleUpdateManager = (id) => setDoc(getDocPath('config', 'main'), { managerId: id }, { merge: true });
            const handleUpdateGeminiKey = (key) => setDoc(getDocPath('config', 'main'), { geminiKey: key }, { merge: true });
            const handleUpdatePassword = (pass) => setDoc(getDocPath('config', 'main'), { managerPassword: pass }, { merge: true });
            const handleUpdateAppId = (newId) => { if(newId && newId.trim()) { localStorage.setItem('event_hub_custom_app_id', newId.trim()); } else { localStorage.removeItem('event_hub_custom_app_id'); } };
            
            const handleGlobalAddAgenda = (type, item) => {
                if(item.eventId) { const evt = events.find(e => e.id === item.eventId); if(evt) handleUpdateEvent(evt.id, { agenda: [...(evt.agenda||[]), item] }); } 
                else if (events.length > 0) { const evt = events[0]; handleUpdateEvent(evt.id, { agenda: [...(evt.agenda||[]), item] }); }
            };
            const handleGlobalDeleteAgenda = (id) => { const evt = events.find(e => (e.agenda || []).some(a => a.id === id)); if (evt) handleUpdateEvent(evt.id, { agenda: evt.agenda.filter(a => a.id !== id) }); };
            const handleGlobalUpdateAgenda = (id, newItem) => { const evt = events.find(e => (e.agenda || []).some(a => a.id === id)); if (evt) handleUpdateEvent(evt.id, { agenda: evt.agenda.map(a => a.id === id ? { ...a, ...newItem } : a) }); };
            
            const handleUpdateEventCategories = (newCats) => { if(selectedEvent) { handleUpdateEvent(selectedEvent.id, { categories: newCats }); setSelectedEvent(prev => ({ ...prev, categories: newCats })); } };
            const handleAddTeamMember = (eventId, memberId) => { const event = events.find(e => e.id === eventId); if (event && !event.teamIds?.includes(memberId)) handleUpdateEvent(eventId, { teamIds: [...(event.teamIds || []), memberId] }); };
            const handleRemoveTeamMember = (eventId, memberId) => { const event = events.find(e => e.id === eventId); if(event) handleUpdateEvent(eventId, { teamIds: (event.teamIds || []).filter(id => id !== memberId) }); };

            const handleLogout = () => {
                localStorage.removeItem('eventhub_active_user_id');
                setActiveUserId(null);
            };

            const handleImportFispal2025 = async () => {
                if (!confirm("Isso irá APAGAR as tarefas e eventos atuais com o nome 'Fispal' e importar a nova estrutura completa da planilha 2025.\n\nVocê tem certeza?")) return;

                const oldFispalEvents = events.filter(e => e.title.toLowerCase().includes('fispal'));
                for (const ev of oldFispalEvents) {
                    deleteDoc(getDocPath('events', ev.id));
                    tasks.filter(t => t.eventId === ev.id).forEach(t => deleteDoc(getDocPath('tasks', t.id)));
                }

                const eventId = "fispal-" + Date.now();
                
                const importedCategories = FISPAL_2025_DATA.categories.map((c, i) => {
                    const catId = `cat-${Date.now()}-${i}`;
                    const subcats = c.subcategories.map((subTitle, j) => ({ id: `sub-${catId}-${j}`, title: subTitle }));
                    return { id: catId, title: c.title, color: c.color, icon: c.icon, phases: ['pre', 'during', 'post'], responsibleId: null, subcategories: subcats, _rawTasks: c.tasks };
                });

                const newEvent = {
                    id: eventId, title: FISPAL_2025_DATA.title, location: "São Paulo, SP", driveLink: "", startDate: FISPAL_2025_DATA.date, endDate: FISPAL_2025_DATA.date, dateRange: "24/06/2025", responsibleId: members[0]?.id || null, teamIds: [],
                    categories: importedCategories.map(c => { const { _rawTasks, ...rest } = c; return rest; }),
                    agenda: [], coverIcon: FISPAL_2025_DATA.coverIcon
                };

                let tasksToCreate = [];
                let taskOrder = Date.now();

                importedCategories.forEach(cat => {
                    cat._rawTasks.forEach((t, index) => {
                        const subcat = cat.subcategories.find(s => s.title === t.s);
                        tasksToCreate.push({
                            id: Date.now() + Math.floor(Math.random() * 1000000) + index,
                            eventId, text: t.t, category: cat.id, subcategoryId: subcat ? subcat.id : null, phase: 'pre', priority: 'medium', status: 'planning', cost: 0, responsible: null, messages: [], support: [], subtasks: [], transferHistory: [], order: taskOrder++
                        });
                    });
                });

                handleCreateEvent(newEvent, tasksToCreate);
                alert("Fispal 2025 gerada com sucesso! Aguarde uns instantes para as tarefas aparecerem no seu painel.");
            };

            const currentSelectedEvent = selectedEvent ? visibleEvents.find(e => e.id === selectedEvent.id) : null;

            if (!activeUserId && members.length > 0) { 
                return <ProfileSelectionScreen members={members} onSelect={(id) => { localStorage.setItem('eventhub_active_user_id', id); setActiveUserId(id); }} />; 
            }
            
            if (user && members.length === 0) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-gray-500 font-bold animate-pulse">Carregando painel...</p>
                    </div>
                );
            }

            if (user && members.length > 0 && !currentUserMember) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-gray-500 font-bold animate-pulse">Sincronizando perfil...</p>
                        <button onClick={handleLogout} className="mt-4 text-xs text-blue-600 underline">Voltar para seleção</button>
                    </div>
                );
            }

            return (
                <>
                    {view === 'dashboard' && <Dashboard events={visibleEvents} tasks={visibleTasks} members={members} currentUser={currentUserMember} notifications={notifications} onMarkAsReadNotification={handleMarkAsReadNotification} onClearAllNotifications={handleClearAllNotifications} onSelectEvent={(e) => { setSelectedEvent(e); setView('detail'); }} onNewEvent={() => setIsNewEventOpen(true)} onMemberClick={setSelectedWorkloadMember} onAddAgendaItem={handleGlobalAddAgenda} onDeleteAgendaItem={handleGlobalDeleteAgenda} onUpdateAgendaItem={handleGlobalUpdateAgenda} globalLogo={logo} managerId={managerId} onLogout={handleLogout} onImportFispal2025={handleImportFispal2025} />}
                    {view === 'detail' && currentSelectedEvent && (
                        <EventDetail 
                            event={currentSelectedEvent} onBack={() => setView('dashboard')} 
                            tasks={visibleTasks} members={members} currentUser={currentUserMember}
                            categories={currentSelectedEvent.categories || DEFAULT_CATEGORIES}
                            onUpdateTask={handleUpdateTask} onUpdateEvent={handleUpdateEvent} onDeleteTask={handleDeleteTask}
                            onOpenCategorySettings={() => setIsCatSettingsOpen(true)} onAddTask={() => setIsNewTaskOpen(true)}
                            onAddTeamMember={handleAddTeamMember} onRemoveTeamMember={handleRemoveTeamMember}
                            onDeleteEvent={handleDeleteEvent} onCreateMember={handleAddMember} createNotification={handleCreateNotification}
                        />
                    )}
                    {view === 'agenda' && <GlobalAgendaView events={visibleEvents} tasks={visibleTasks} onAddAgendaItem={handleGlobalAddAgenda} onDeleteAgendaItem={handleGlobalDeleteAgenda} onUpdateAgendaItem={handleGlobalUpdateAgenda}/>}
                    {view === 'team' && <GlobalTeamView members={members} onEdit={() => setIsSettingsOpen(true)} />}
                    {view === 'settings' && <SettingsModal isOpen={true} onClose={() => setView('dashboard')} members={members} onUpdateMember={handleUpdateMember} onAddMember={handleAddMember} onDeleteMember={handleDeleteMember} onUpdateLogo={handleUpdateLogo} currentLogo={logo} managerId={managerId} onUpdateManager={handleUpdateManager} onUpdateGeminiKey={handleUpdateGeminiKey} currentAppId={appId} onUpdateAppId={handleUpdateAppId} managerPassword={managerPassword} onUpdatePassword={handleUpdatePassword}/>}
                    
                    <BottomNav activeTab={view} onChangeTab={(v) => { if(v === 'settings') setIsSettingsOpen(true); else setView(v); }} onAdd={() => setIsNewEventOpen(true)} />
                    
                    <button onClick={() => setIsAIOpen(!isAIOpen)} className="fixed bottom-24 right-6 w-14 h-14 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full shadow-xl shadow-blue-600/30 flex items-center justify-center text-white z-[150] hover:scale-110 transition-transform duration-300 animate-in">
                        {isAIOpen ? <X size={24}/> : <Sparkles size={24}/>}
                    </button>
                    <AIAssistant isOpen={isAIOpen} onClose={() => setIsAIOpen(false)} context={{totalCost: visibleTasks.reduce((a,b)=>a+(b.cost||0),0), tasks: visibleTasks, members, events: visibleEvents}} apiKey={geminiKey} />

                    <NewEventModal isOpen={isNewEventOpen} onClose={() => setIsNewEventOpen(false)} onCreate={handleCreateEvent} members={members} />
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} members={members} onUpdateMember={handleUpdateMember} onAddMember={handleAddMember} onDeleteMember={handleDeleteMember} onUpdateLogo={handleUpdateLogo} currentLogo={logo} managerId={managerId} onUpdateManager={handleUpdateManager} onUpdateGeminiKey={handleUpdateGeminiKey} currentAppId={appId} onUpdateAppId={handleUpdateAppId} managerPassword={managerPassword} onUpdatePassword={handleUpdatePassword}/>
                    <WorkloadDetailModal isOpen={!!selectedWorkloadMember} onClose={() => setSelectedWorkloadMember(null)} member={selectedWorkloadMember} memberTasks={visibleTasks.filter(t => t.responsible?.id === selectedWorkloadMember?.id)} allMembers={members} onUpdateTask={handleUpdateTask} events={visibleEvents} />
                    <ManageCategoriesModal isOpen={isCatSettingsOpen} onClose={() => setIsCatSettingsOpen(false)} members={members} categories={currentSelectedEvent?.categories || DEFAULT_CATEGORIES} onUpdateCategories={handleUpdateEventCategories} />
                    {currentSelectedEvent && <NewTaskModal isOpen={isNewTaskOpen} onClose={() => setIsNewTaskOpen(false)} eventId={currentSelectedEvent.id} eventCategories={currentSelectedEvent.categories || DEFAULT_CATEGORIES} onCreate={handleCreateTask} members={members} />}
                </>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = createRoot(rootElement);
            root.render(<App />);
        } else {
            console.error("Root element not found");
        }
    </script>
</body>
</html>

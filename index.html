                        <button onClick={handleSubmit} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-xl font-bold hover:shadow-lg animate-shine bg-[length:200%_auto]">Criar Evento</button>
                    </div>
                </Modal>
            );
        };

        const EditEventModal = ({ isOpen, onClose, event, onUpdate, onDelete, members }) => {
            const [title, setTitle] = useState(event?.title || '');
            const [startDate, setStartDate] = useState(event?.startDate || '');
            const [endDate, setEndDate] = useState(event?.endDate || '');
            const [location, setLocation] = useState(event?.location || '');
            const [driveLink, setDriveLink] = useState(event?.driveLink || '');
            const [cover, setCover] = useState(event?.coverUrl || '');
            const [responsible, setResponsible] = useState(event?.responsibleId || '');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if(event) { setTitle(event.title || ''); setStartDate(event.startDate || ''); setEndDate(event.endDate || ''); setLocation(event.location || ''); setDriveLink(event.driveLink || ''); setCover(event.coverUrl || ''); setResponsible(event.responsibleId || ''); }
            }, [event]);

            if(!isOpen || !event) return null;

            const handleSave = () => { onUpdate(event.id, { title, startDate, endDate, location, driveLink, coverUrl: cover, responsibleId: responsible }); onClose(); };
            const handleCoverUpload = async (e) => { if(e.target.files[0]) { const url = await compressImage(e.target.files[0], 800); setCover(url); } };

            const getLocalDaysLeft = () => {
                if (!startDate) return 0;
                const [year, month, day] = startDate.split('-').map(Number);
                const target = new Date(year, month - 1, day);
                const today = new Date(); today.setHours(0,0,0,0);
                return Math.ceil((target - today) / (86400000));
            };
            const daysLeft = getLocalDaysLeft();
            const daysLeftText = daysLeft < 0 ? `Terminou há ${Math.abs(daysLeft)} dias` : daysLeft === 0 ? "É hoje!" : `Faltam ${daysLeft} dias`;
            const formatDate = (d) => { if (!d) return ''; const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Editar Evento">
                    <div className={`mb-4 p-3 rounded-xl text-center flex flex-col gap-1 ${daysLeft < 0 ? 'bg-gray-100 text-gray-600' : 'bg-blue-50 text-blue-700'}`}>
                        <span className="text-lg font-bold">{daysLeftText}</span>
                        <span className="text-xs font-normal opacity-80">{formatDate(startDate)} {endDate && endDate !== startDate ? ` - ${formatDate(endDate)}` : ''}{location ? ` • ${location}` : ''}</span>
                    </div>

                    <div className="space-y-4">
                        <div onClick={()=>fileInputRef.current.click()} className="h-32 bg-gray-100 rounded-xl flex items-center justify-center cursor-pointer overflow-hidden relative group border border-gray-200">
                            {cover ? <img src={cover} className="w-full h-full object-cover"/> : <span className="text-gray-400 font-bold">Alterar Capa</span>}
                            <div className="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-white font-bold"><Camera size={24}/></div>
                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleCoverUpload}/>
                        </div>

                        <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nome do Evento</label><input className="w-full p-3 border rounded-xl font-bold text-gray-800" placeholder="Nome" value={title} onChange={e=>setTitle(e.target.value)}/></div>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Início</label><input type="date" className="w-full p-3 border rounded-xl text-sm" value={startDate} onChange={e=>setStartDate(e.target.value)}/></div>
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Fim</label><input type="date" className="w-full p-3 border rounded-xl text-sm" value={endDate} onChange={e=>setEndDate(e.target.value)}/></div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                             <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Localização</label><input className="w-full p-3 border rounded-xl text-sm" placeholder="Ex: São Paulo, SP" value={location} onChange={e=>setLocation(e.target.value)}/></div>
                            <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1 flex items-center gap-1">Link do Drive <HardDrive size={12} className="text-gray-400"/></label><input className="w-full p-3 border rounded-xl text-sm" placeholder="https://drive.google.com/..." value={driveLink} onChange={e=>setDriveLink(e.target.value)}/></div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Responsável</label>
                            <select className="w-full p-3 border rounded-xl bg-white text-sm" value={responsible} onChange={(e) => setResponsible(e.target.value)}>
                                <option value="">Selecione...</option>
                                {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                        </div>
                        
                        <div className="flex gap-2 pt-2">
                            <button onClick={handleSave} className="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">Salvar</button>
                            {onDelete && (<button onClick={() => onDelete(event.id)} className="bg-red-50 text-red-600 p-3 rounded-xl font-bold hover:bg-red-100 transition-colors" title="Excluir Evento"><Trash2 size={20}/></button>)}
                        </div>
                    </div>
                </Modal>
            );
        };

        const NewTaskModal = ({ isOpen, onClose, eventCategories, onCreate, members, eventId }) => {
            const [text, setText] = useState('');
            const [category, setCategory] = useState(eventCategories[0]?.id || '');
            const [phase, setPhase] = useState('pre');
            const [responsible, setResponsible] = useState('');
            const [support, setSupport] = useState([]);
            const [cost, setCost] = useState(0);

            // New fields
            const [quantity, setQuantity] = useState('');
            const [supplier, setSupplier] = useState('');
            const [nimbiId, setNimbiId] = useState('');
            const [deliveryDate, setDeliveryDate] = useState('');
            const [electrical, setElectrical] = useState(false); 
            const [kva, setKva] = useState('');
            const [voltage, setVoltage] = useState('');
            const [hydraulic, setHydraulic] = useState('');

            // PRE-SELECT RESPONSIBLE BASED ON CATEGORY
            useEffect(() => {
                if(isOpen && category) {
                    const catObj = eventCategories.find(c => c.id === category);
                    if(catObj && catObj.responsibleId && !responsible) {
                        setResponsible(catObj.responsibleId);
                    }
                }
            }, [category, isOpen]);

            if (!isOpen) return null;

            const handleCreate = () => {
                if (!text) return;
                const responsibleMember = members.find(m => m.id === responsible);
                const supportMembers = support.map(id => members.find(m => m.id === id)).filter(Boolean);

                onCreate({
                    id: Date.now(), eventId, text, category, phase,
                    responsible: responsibleMember || null, support: supportMembers,
                    status: 'planning', priority: 'medium', subtasks: [], messages: [], transferHistory: [],
                    cost: Number(cost), order: Date.now(),
                    quantity, supplier, nimbiId, deliveryDate, electrical, kva, voltage, hydraulic
                });
                
                setText(''); setResponsible(''); setSupport([]); setCost(0);
                setQuantity(''); setSupplier(''); setNimbiId(''); setDeliveryDate('');
                setElectrical(false); setKva(''); setVoltage(''); setHydraulic('');
                onClose();
            };

            const toggleSupport = (id) => {
                if(support.includes(id)) setSupport(prev => prev.filter(s => s !== id));
                else setSupport(prev => [...prev, id]);
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Nova Tarefa">
                    <div className="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                        <input className="w-full p-3 border rounded-xl" placeholder="Descrição da Tarefa" value={text} onChange={e=>setText(e.target.value)} autoFocus/>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="text-xs font-bold text-gray-500 uppercase">Categoria</label><select className="w-full p-2 border rounded-lg mt-1" value={category} onChange={e=>setCategory(e.target.value)}>{eventCategories.map(c=><option key={c.id} value={c.id}>{c.title}</option>)}</select></div>
                            <div><label className="text-xs font-bold text-gray-500 uppercase">Fase</label><select className="w-full p-2 border rounded-lg mt-1" value={phase} onChange={e=>setPhase(e.target.value)}><option value="pre">Pré-Evento</option><option value="during">Durante</option><option value="post">Pós-Evento</option></select></div>
                        </div>
                        
                        <div className="pt-2 border-t border-gray-100">
                             <p className="text-xs font-bold text-blue-600 uppercase mb-2">Detalhes Operacionais (Opcional)</p>
                             <div className="grid grid-cols-2 gap-3 mb-2">
                                <div><label className="text-xs font-bold text-gray-500">Qtd.</label><input type="number" className="w-full p-2 border rounded-lg" value={quantity} onChange={e=>setQuantity(e.target.value)}/></div>
                                <div><label className="text-xs font-bold text-gray-500">Custo (R$)</label><input type="number" className="w-full p-2 border rounded-lg" value={cost} onChange={e=>setCost(e.target.value)}/></div>
                             </div>
                             <div className="grid grid-cols-2 gap-3 mb-2">
                                <div><label className="text-xs font-bold text-gray-500">Fornecedor</label><input className="w-full p-2 border rounded-lg" value={supplier} onChange={e=>setSupplier(e.target.value)}/></div>
                                <div><label className="text-xs font-bold text-gray-500">ID Nimbi</label><input className="w-full p-2 border rounded-lg" value={nimbiId} onChange={e=>setNimbiId(e.target.value)}/></div>
                             </div>
                             <div className="mb-2"><label className="text-xs font-bold text-gray-500">Data/Hora Entrega (Prazo)</label><input type="datetime-local" className="w-full p-2 border rounded-lg" value={deliveryDate} onChange={e=>setDeliveryDate(e.target.value)}/></div>
                        </div>

                         <div className="pt-2 border-t border-gray-100">
                             <p className="text-xs font-bold text-blue-600 uppercase mb-2">Especificações Técnicas (Opcional)</p>
                             <div className="flex items-center gap-2 mb-2">
                                <input type="checkbox" id="elec" checked={electrical} onChange={e=>setElectrical(e.target.checked)} className="rounded text-blue-600"/>
                                <label htmlFor="elec" className="text-sm text-gray-700 font-bold">Necessita Elétrica?</label>
                             </div>
                             {electrical && (
                                <div className="grid grid-cols-2 gap-3 mb-2 animate-in pl-6 border-l-2 border-gray-100">
                                    <div><label className="text-xs font-bold text-gray-500">KVA</label><input className="w-full p-2 border rounded-lg" value={kva} onChange={e=>setKva(e.target.value)}/></div>
                                    <div><label className="text-xs font-bold text-gray-500">Tensão</label><input className="w-full p-2 border rounded-lg" value={voltage} onChange={e=>setVoltage(e.target.value)} placeholder="Ex: 220v"/></div>
                                </div>
                             )}
                             <div><label className="text-xs font-bold text-gray-500">Infos Hidráulica</label><input className="w-full p-2 border rounded-lg" placeholder="Ex: Ponto de água/esgoto" value={hydraulic} onChange={e=>setHydraulic(e.target.value)}/></div>
                        </div>

                        <div><label className="text-xs font-bold text-gray-500 uppercase">Responsável</label><select className="w-full p-2 border rounded-lg mt-1" value={responsible} onChange={e=>setResponsible(e.target.value)}><option value="">Selecione...</option>{members.filter(m => m.active !== false).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
                        <div><label className="text-xs font-bold text-gray-500 uppercase mb-2 block">Apoio (Opcional)</label><div className="flex flex-wrap gap-2">{members.filter(m=>m.id!==responsible && m.active !== false).map(m=><button key={m.id} onClick={()=>toggleSupport(m.id)} className={`p-1.5 rounded-full border-2 ${support.includes(m.id)?'border-blue-500':'border-transparent opacity-50'}`}><Avatar member={m} size="w-8 h-8"/></button>)}</div></div>
                        <button onClick={handleCreate} className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Adicionar Tarefa</button>
                    </div>
                </Modal>
            );
        };

        // --- Bottom Navigation ---
        const BottomNav = ({ activeTab, onChangeTab, onAdd }) => (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-2 flex justify-between items-center z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button onClick={() => onChangeTab('dashboard')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'dashboard' ? 'text-blue-900' : 'text-gray-400'}`}><Home size={20} /><span className="text-[10px]">Início</span></button>
                <button onClick={() => onChangeTab('agenda')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'agenda' ? 'text-blue-900' : 'text-gray-400'}`}><CalendarIcon size={20} /><span className="text-[10px]">Agenda</span></button>
                <div className="relative -top-6"><button onClick={onAdd} className="w-14 h-14 bg-gradient-to-r from-blue-900 to-blue-800 rounded-full shadow-lg flex items-center justify-center text-white hover:scale-105 transition-transform"><Plus size={28} /></button></div>
                <button onClick={() => onChangeTab('team')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'team' ? 'text-blue-900' : 'text-gray-400'}`}><Users size={20} /><span className="text-[10px]">Equipe</span></button>
                <button onClick={() => onChangeTab('settings')} className={`flex flex-col items-center gap-1 p-2 ${activeTab === 'settings' ? 'text-blue-900' : 'text-gray-400'}`}><Settings size={20} /><span className="text-[10px]">Ajustes</span></button>
            </div>
        );

        // --- Task Detail Modal (With Transfer Logic & Chat) ---
        const TaskDetailModal = ({ isOpen, onClose, task, members, dbOperations, deleteTask, currentUser, createNotification }) => {
            const [messageText, setMessageText] = useState("");
            const [chatAttachment, setChatAttachment] = useState(null);
            const [newSubtask, setNewSubtask] = useState("");
            const [showEmojis, setShowEmojis] = useState(false);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingText, setEditingText] = useState("");

            // Transfer Logic State
            const [transferTargetId, setTransferTargetId] = useState(null);
            const [transferReason, setTransferReason] = useState('');

            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            const currentTask = task; 

            if (!isOpen || !currentTask) return null;

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [currentTask.messages]);

            const handleSendMessage = () => {
                if (!messageText.trim() && !chatAttachment) return;
                
                // Determina quem é o sender. Se não tiver currentUser, usa um genérico ou avisa
                const sender = currentUser || members[0]; 
                
                const newMessage = {
                    id: Date.now(),
                    senderId: sender.id,
                    senderName: sender.name,
                    text: messageText,
                    image: chatAttachment,
                    timestamp: new Date().toISOString()
                };
                
                const updatedMessages = [...(currentTask.messages || []), newMessage];
                dbOperations.updateTask(currentTask.id, { messages: updatedMessages });
                
                // NOTIFICATIONS LOGIC FOR CHAT MENTIONS AND REPLIES
                // 1. Mentions (@Name)
                const mentions = members.filter(m => messageText.includes(`@${m.name.split(' ')[0]}`) || messageText.includes(`@${m.name}`));
                mentions.forEach(m => {
                    if (m.id !== sender.id) {
                        createNotification({
                            userId: m.id, title: "Menção no Chat", 
                            text: `${sender.name} mencionou você na tarefa "${currentTask.text}".`,
                            taskId: currentTask.id, read: false, createdAt: new Date().toISOString()
                        });
                    }
                });

                // 2. Notify Responsible (if sender is not responsible and not already mentioned)
                if (currentTask.responsible && currentTask.responsible.id !== sender.id && !mentions.some(m => m.id === currentTask.responsible.id)) {
                    createNotification({
                        userId: currentTask.responsible.id, title: "Nova Mensagem na Tarefa",
                        text: `${sender.name} comentou na sua tarefa "${currentTask.text}".`,
                        taskId: currentTask.id, read: false, createdAt: new Date().toISOString()
                    });
                }

                setMessageText("");
                setChatAttachment(null);
            };

            const handleStartEditing = (msg) => { setEditingMessageId(msg.id); setEditingText(msg.text); };
            const handleCancelEditing = () => { setEditingMessageId(null); setEditingText(""); };

            const handleSaveEdit = (msgId) => {
                if (!editingText.trim()) return; 
                const updatedMessages = currentTask.messages.map(m => m.id === msgId ? { ...m, text: editingText, editedAt: new Date().toISOString() } : m);
                dbOperations.updateTask(currentTask.id, { messages: updatedMessages });
                setEditingMessageId(null); setEditingText("");
            };

            const formatEditedDate = (isoDate) => {
                if (!isoDate) return "";
                const date = new Date(isoDate); const today = new Date();
                const isToday = date.toDateString() === today.toDateString();
                const timeStr = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                return isToday ? `Editado às ${timeStr}` : `Editado em ${date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' })} às ${timeStr}`;
            };

            const handleAddSubtask = () => {
                if (!newSubtask.trim()) return;
                const newSub = { id: Date.now(), text: newSubtask, completed: false };
                dbOperations.updateTask(currentTask.id, { subtasks: [...(currentTask.subtasks || []), newSub] });
                setNewSubtask("");
            };

            const toggleSubtask = (subId) => {
                const updatedSubtasks = currentTask.subtasks.map(s => s.id === subId ? { ...s, completed: !s.completed } : s);
                dbOperations.updateTask(currentTask.id, { subtasks: updatedSubtasks });
            };

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (file) { const url = await compressImage(file, 400); setChatAttachment(url); }
            };
            const addEmoji = (emoji) => { setMessageText(prev => prev + emoji); setShowEmojis(false); };

            const toggleSupport = (memberId) => {
                const currentSupport = currentTask.support || [];
                const newSupport = currentSupport.some(m => m.id === memberId) ? currentSupport.filter(m => m.id !== memberId) : [...currentSupport, members.find(m => m.id === memberId)];
                dbOperations.updateTask(currentTask.id, { support: newSupport });
            };

            const handleDeleteTask = () => { if(confirm("Tem a certeza que deseja excluir esta tarefa?")) { deleteTask(currentTask.id); onClose(); } };

            // --- LÓGICA DE TRANSFERÊNCIA ---
            const handleResponsibleSelectChange = (e) => {
                const selectedId = e.target.value;
                if (selectedId !== (currentTask.responsible?.id || '')) {
                    setTransferTargetId(selectedId);
                    setTransferReason(''); // reseta motivo ao abrir
                }
            };

            const confirmTransfer = () => {
                if (!transferReason.trim()) { alert("Por favor, preencha o motivo da transferência."); return; }
                const newResponsible = members.find(m => m.id === transferTargetId);
                const sender = currentUser || members[0];

                const historyEntry = {
                    date: new Date().toISOString(),
                    from: currentTask.responsible || null,
                    to: newResponsible || null,
                    reason: transferReason,
                    by: sender
                };

                dbOperations.updateTask(currentTask.id, {
                    responsible: newResponsible || null,
                    transferHistory: [...(currentTask.transferHistory || []), historyEntry]
                });

                // Cria notificação para o novo responsável
                if (newResponsible) {
                    createNotification({
                        userId: newResponsible.id,
                        title: "Tarefa Transferida",
                        text: `${sender.name} transferiu a tarefa "${currentTask.text}" para você. Motivo: ${transferReason}`,
                        taskId: currentTask.id,
                        read: false,
                        createdAt: new Date().toISOString()
                    });
                }

                setTransferTargetId(null);
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Tarefa: ${currentTask.text}`} fullScreen={true}>
                    {/* OVERLAY DE TRANSFERÊNCIA DE TAREFA */}
                    {transferTargetId !== null && (
                        <div className="absolute inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm animate-in">
                                <h3 className="text-lg font-bold text-gray-900 mb-2 flex items-center gap-2"><Repeat size={20} className="text-blue-600"/> Transferir Tarefa</h3>
                                <p className="text-sm text-gray-600 mb-4">Você está transferindo esta tarefa para <strong className="text-blue-700">{members.find(m => m.id === transferTargetId)?.name || 'Nenhum'}</strong>. Por favor, registre o motivo no histórico.</p>
                                <textarea 
                                    className="w-full p-3 border border-gray-300 rounded-xl outline-none focus:border-blue-500 mb-4 text-sm resize-none" 
                                    rows="3" placeholder="Motivo da transferência..."
                                    value={transferReason} onChange={e=>setTransferReason(e.target.value)} autoFocus
                                />
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setTransferTargetId(null)} className="px-4 py-2 text-sm text-gray-500 font-bold hover:bg-gray-100 rounded-lg">Cancelar</button>
                                    <button onClick={confirmTransfer} className="px-4 py-2 text-sm bg-blue-600 text-white font-bold rounded-lg shadow hover:bg-blue-700">Confirmar Transferência</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row h-full">
                        <div className="flex-1 p-6 overflow-y-auto border-r border-gray-200">
                            <div className="flex justify-between items-start mb-6">
                                <h2 className="text-2xl font-bold text-gray-900">{currentTask.text}</h2>
                                <button onClick={handleDeleteTask} className="text-red-500 hover:bg-red-50 p-2 rounded"><Trash2 size={20}/></button>
                            </div>
                            
                            {/* --- STATUS SELECTION --- */}
                            <div className="mb-4">
                                <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Status</label>
                                <select 
                                    className="w-full p-3 border rounded-xl bg-white text-sm font-bold text-gray-700" 
                                    value={currentTask.status || 'planning'} 
                                    onChange={(e) => dbOperations.updateTask(currentTask.id, { status: e.target.value })}
                                >
                                    {STATUS_COLUMNS.map(s => <option key={s.id} value={s.id}>{s.title}</option>)}
                                </select>
                            </div>

                             {/* --- OPERATIONAL DETAILS --- */}
                             <div className="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <h4 className="text-xs font-bold text-blue-800 uppercase mb-3 border-b pb-1">Detalhes Operacionais</h4>
                                <div className="grid grid-cols-2 gap-4 mb-3">
                                    <div><label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Quantidade</label><input type="number" className="w-full p-2 border rounded-lg text-sm" value={currentTask.quantity || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { quantity: e.target.value })}/></div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Custo (R$)</label><input type="number" className="w-full p-2 border rounded-lg text-sm" value={currentTask.cost || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { cost: e.target.value })}/></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-3">
                                    <div><label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Fornecedor</label><input className="w-full p-2 border rounded-lg text-sm" value={currentTask.supplier || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { supplier: e.target.value })}/></div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">ID Nimbi</label><input className="w-full p-2 border rounded-lg text-sm" value={currentTask.nimbiId || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { nimbiId: e.target.value })}/></div>
                                </div>
                                 <div className="mb-3">
                                    <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Entrega / Prazo Limite</label>
                                    <input type="datetime-local" className="w-full p-2 border rounded-lg text-sm" value={currentTask.deliveryDate || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { deliveryDate: e.target.value })}/>
                                </div>
                             </div>

                             {/* --- TECHNICAL SPECS --- */}
                             <div className="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <h4 className="text-xs font-bold text-blue-800 uppercase mb-3 border-b pb-1">Especificações Técnicas</h4>
                                <div className="flex items-center gap-2 mb-3">
                                    <input type="checkbox" id="elec_detail" checked={currentTask.electrical} onChange={e=>dbOperations.updateTask(currentTask.id, { electrical: e.target.checked })} className="rounded text-blue-600"/>
                                    <label htmlFor="elec_detail" className="text-sm font-bold text-gray-700">Requer Elétrica</label>
                                </div>
                                {currentTask.electrical && (
                                    <div className="grid grid-cols-2 gap-4 mb-3 pl-4 border-l-2 border-blue-200">
                                        <div><label className="block text-[10px] font-bold text-gray-500">KVA</label><input className="w-full p-2 border rounded-lg text-sm" value={currentTask.kva || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { kva: e.target.value })}/></div>
                                        <div><label className="block text-[10px] font-bold text-gray-500">Tensão</label><input className="w-full p-2 border rounded-lg text-sm" value={currentTask.voltage || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { voltage: e.target.value })}/></div>
                                    </div>
                                )}
                                <div><label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Hidráulica</label><input className="w-full p-2 border rounded-lg text-sm" value={currentTask.hydraulic || ''} onChange={e=>dbOperations.updateTask(currentTask.id, { hydraulic: e.target.value })} placeholder="Detalhes..."/></div>
                             </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-2 flex items-center gap-1"><UserCheck size={14}/> Responsável</label>
                                    {/* DROPDOWN DE TRANSFERÊNCIA DE RESPONSÁVEL */}
                                    <select 
                                        className="w-full p-3 border border-blue-200 rounded-xl bg-blue-50/30 text-sm font-bold text-blue-900 focus:ring-2 focus:ring-blue-200 outline-none transition-all" 
                                        value={currentTask.responsible?.id || ''} 
                                        onChange={handleResponsibleSelectChange}
                                    >
                                        <option value="">Sem responsável</option>
                                        {members.filter(m => m.active !== false || m.id === currentTask.responsible?.id).map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                    </select>
                                </div>
                                <div><label className="block text-xs font-bold text-gray-500 uppercase mb-2">Apoio</label><div className="flex flex-wrap gap-2">{members.map(m => (<button key={m.id} onClick={() => toggleSupport(m.id)} className={`p-1.5 rounded-full border-2 transition-all ${currentTask.support?.some(s => s.id === m.id) ? 'border-blue-500 scale-110' : 'border-transparent opacity-50 hover:opacity-100'}`}><Avatar member={m} size="w-8 h-8"/></button>))}</div></div>
                            </div>

                            {/* HISTÓRICO DE TRANSFERÊNCIAS */}
                            {(currentTask.transferHistory || []).length > 0 && (
                                <div className="mb-8 p-4 bg-slate-50 border border-slate-200 rounded-xl">
                                    <h4 className="text-xs font-bold text-slate-500 uppercase mb-3 flex items-center gap-2"><History size={14}/> Histórico de Transferências</h4>
                                    <div className="space-y-3">
                                        {currentTask.transferHistory.map((h, i) => (
                                            <div key={i} className="text-xs bg-white p-3 rounded-lg border border-slate-200 shadow-sm relative pl-8">
                                                <div className="absolute left-3 top-4 w-2 h-2 rounded-full bg-blue-500"></div>
                                                {i < currentTask.transferHistory.length - 1 && <div className="absolute left-[15px] top-6 w-px h-[120%] bg-slate-200"></div>}
                                                <div className="flex justify-between items-start mb-1">
                                                    <p className="font-medium text-slate-700">De <strong className="text-slate-900">{h.from?.name || 'Ninguém'}</strong> para <strong className="text-blue-700">{h.to?.name || 'Ninguém'}</strong></p>
                                                    <span className="text-[9px] text-slate-400">{new Date(h.date).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>
                                                </div>
                                                <p className="text-slate-600 mb-1"><strong>Motivo:</strong> {h.reason}</p>
                                                <p className="text-[9px] text-slate-400 font-medium">Registrado por: {h.by?.name || 'Sistema'}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="mb-8"><h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><CheckSquare size={18}/> Tarefas Complementares</h3><div className="space-y-2 mb-3">{currentTask.subtasks?.map(sub => (<div key={sub.id} className="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg group"><input type="checkbox" checked={sub.completed} onChange={() => toggleSubtask(sub.id)} className="w-4 h-4 text-blue-600 rounded cursor-pointer"/><span className={`text-sm flex-1 ${sub.completed ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{sub.text}</span><button onClick={() => { const newSubs = currentTask.subtasks.filter(s => s.id !== sub.id); dbOperations.updateTask(currentTask.id, { subtasks: newSubs }); }} className="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><X size={14}/></button></div>))}</div><div className="flex gap-2"><input className="flex-1 p-2 border rounded-lg text-sm" placeholder="Adicionar item..." value={newSubtask} onChange={e => setNewSubtask(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddSubtask()}/><button onClick={handleAddSubtask} className="bg-blue-100 text-blue-700 p-2 rounded-lg"><Plus size={18}/></button></div></div>
                        </div>
                        
                        <div className="w-full md:w-[400px] bg-gray-50 flex flex-col border-l border-gray-200">
                            <div className="p-4 border-b bg-white font-bold text-gray-700 flex items-center gap-2"><MessageSquare size={18}/> Chat da Tarefa</div>
                            <div className="flex-1 p-4 overflow-y-auto space-y-4">
                                {(currentTask.messages || []).length === 0 && <p className="text-center text-gray-400 text-xs mt-10">Inicie a conversa sobre esta tarefa.<br/>Dica: Digite @nome para notificar alguém!</p>}
                                {(currentTask.messages || []).map(msg => (
                                    <div key={msg.id} className={`flex gap-2 group/msg ${msg.senderId === currentUser?.id ? 'flex-row-reverse' : ''}`}>
                                        <div className="flex-shrink-0 mt-1"><Avatar member={members.find(m => m.id === msg.senderId)} size="w-8 h-8"/></div>
                                        <div className={`p-3 rounded-xl text-sm max-w-[80%] relative shadow-sm ${msg.senderId === currentUser?.id ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border border-gray-200 rounded-tl-none'}`}>
                                            <p className="text-[10px] font-bold opacity-70 mb-1">{msg.senderName}</p>
                                            
                                            {editingMessageId === msg.id ? (
                                                <div className="flex flex-col gap-2 min-w-[200px]">
                                                    <textarea 
                                                        className="w-full p-2 text-gray-800 rounded bg-white/90 border-none outline-none text-sm resize-none" 
                                                        rows={2} value={editingText} onChange={e => setEditingText(e.target.value)} autoFocus
                                                    />
                                                    <div className="flex justify-end gap-2">
                                                        <button onClick={handleCancelEditing} className="text-xs opacity-80 hover:opacity-100 font-bold">Cancelar</button>
                                                        <button onClick={() => handleSaveEdit(msg.id)} className="bg-white/20 hover:bg-white/30 px-2 py-0.5 rounded text-xs font-bold">Salvar</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <>
                                                    {msg.image && <img src={msg.image} className="w-full rounded-lg mb-2"/>}
                                                    {/* Realçar menções visualmente */}
                                                    <p style={{whiteSpace: 'pre-wrap'}}>
                                                        {msg.text.split(/(@\w+)/g).map((part, index) => 
                                                            part.startsWith('@') ? <strong key={index} className={msg.senderId === currentUser?.id ? "text-amber-200" : "text-blue-600"}>{part}</strong> : part
                                                        )}
                                                    </p>
                                                    {msg.editedAt && (
                                                        <div className={`text-[9px] mt-1 flex items-center gap-1 ${msg.senderId === currentUser?.id ? 'text-blue-100 justify-end' : 'text-gray-400 justify-end'}`}>
                                                            <Edit2 size={8} /> {formatEditedDate(msg.editedAt)}
                                                        </div>
                                                    )}
                                                </>
                                            )}

                                            {/* Edit Button (Only for sender) */}
                                            {msg.senderId === currentUser?.id && !editingMessageId && (
                                                <button 
                                                    onClick={() => handleStartEditing(msg)} 
                                                    className="absolute -top-2 -right-2 bg-gray-200 text-gray-600 hover:bg-blue-500 hover:text-white rounded-full p-1 opacity-0 group-hover/msg:opacity-100 transition-opacity shadow-sm"
                                                    title="Editar mensagem"
                                                >
                                                    <Edit2 size={10}/>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                <div ref={chatEndRef}></div>
                            </div>
                            <div className="p-3 bg-white border-t">
                                {chatAttachment && (<div className="flex items-center gap-2 bg-blue-50 p-2 rounded-lg mb-2 text-xs text-blue-700"><ImageIcon size={14}/> Imagem selecionada <button onClick={() => setChatAttachment(null)}><X size={14}/></button></div>)}
                                <div className="flex items-end gap-2">
                                    <div className="flex-1 bg-gray-100 rounded-xl flex items-center p-1 relative border border-gray-200 focus-within:border-blue-400 transition-colors">
                                        <button onClick={() => fileInputRef.current.click()} className="p-2 text-gray-400 hover:text-blue-600"><Paperclip size={18}/></button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFileSelect}/>
                                        <button onClick={() => setShowEmojis(!showEmojis)} className="p-2 text-gray-400 hover:text-yellow-500"><Smile size={18}/></button>
                                        {showEmojis && (<div className="absolute bottom-12 left-0 bg-white shadow-xl border rounded-xl p-2 grid grid-cols-6 gap-2 z-10 w-64">{['👍','👎','🔥','🎉','✅','❌','📅','😊','🤔','👀','🚀','💡'].map(e => (<button key={e} onClick={() => addEmoji(e)} className="text-xl hover:bg-gray-100 rounded p-1">{e}</button>))}</div>)}
                                        <textarea className="flex-1 bg-transparent border-none outline-none text-sm p-2 max-h-24 resize-none" rows={1} placeholder="Escreva uma mensagem... Use @nome para notificar." value={messageText} onChange={e => setMessageText(e.target.value)} onKeyDown={e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); } }}/>
                                    </div>
                                    <button onClick={handleSendMessage} className="p-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-md"><Send size={18}/></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- Dashboard & Event Views ---

        const Dashboard = ({ events, tasks, members, currentUser, notifications, onMarkAsReadNotification, onClearAllNotifications, onSelectEvent, onNewEvent, onMemberClick, onAddAgendaItem, onDeleteAgendaItem, onUpdateAgendaItem, globalLogo, managerId }) => {
            const [eventViewMode, setEventViewMode] = useState('active');
            
            const activeEvents = events.filter(e => !isEventFinished(e)).sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
            const finishedEvents = events.filter(e => isEventFinished(e)).sort((a, b) => new Date(b.endDate || b.startDate) - new Date(a.endDate || a.startDate));
            const activeEventIds = activeEvents.map(e => e.id);
            
            const workload = members.filter(m => m.role !== 'Temporário' && m.active !== false).map(m => {
                const memberTasks = tasks.filter(t => activeEventIds.includes(t.eventId) && t.responsible?.id === m.id);
                const pending = memberTasks.filter(t => t.status !== 'done').length;
                const done = memberTasks.filter(t => t.status === 'done').length;
                return { ...m, pending, done, total: pending + done };
            });
            
            const manager = members.find(m => m.id === managerId) || members[0];
            const activeTasks = tasks.filter(t => activeEventIds.includes(t.eventId));
            const completedActiveTasks = activeTasks.filter(t => t.status === 'done').length;
            const totalActiveTasks = activeTasks.length;
            const progress = totalActiveTasks > 0 ? Math.round((completedActiveTasks / totalActiveTasks) * 100) : 0;
            const eventsToDisplay = eventViewMode === 'active' ? activeEvents : finishedEvents;

            return (
                <div className="max-w-[1600px] mx-auto p-6 md:p-8 animate-in pb-24">
                    <div className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 flex items-center justify-center font-bold text-xs bg-transparent rounded-2xl overflow-hidden">{globalLogo ? <img src={globalLogo} className="w-full h-full object-contain"/> : 'LOGO'}</div>
                            <div>
                                <h1 className="text-2xl font-extrabold text-blue-950">Event Hub</h1>
                                <p className="text-sm text-gray-500">Olá, <strong className="text-blue-600">{currentUser?.name.split(' ')[0] || 'Usuário'}</strong></p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <NotificationCenter notifications={notifications} currentUser={currentUser} tasks={tasks} onMarkAsRead={onMarkAsReadNotification} onClearAll={onClearAllNotifications} />
                            <div className="flex items-center gap-3 bg-white p-1.5 rounded-full shadow-sm border border-gray-100 pr-4 cursor-pointer group">
                                <Avatar member={currentUser} size="w-10 h-10"/>
                                <div className="text-left hidden sm:block">
                                    <p className="text-xs font-bold text-gray-800">{currentUser?.name}</p>
                                    <p className="text-[10px] text-gray-500 truncate max-w-[100px]">{currentUser?.email || currentUser?.role}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 gap-8">
                        <div>
                            {/* Stats Row */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 relative overflow-hidden flex items-center justify-between h-auto min-h-[14rem]">
                                    <div className="relative w-32 h-32 flex-shrink-0"><svg className="w-full h-full -rotate-90"><circle cx="64" cy="64" r="54" stroke="#F3F4F6" strokeWidth="12" fill="none"/><circle cx="64" cy="64" r="54" stroke="#1e3a8a" strokeWidth="12" fill="none" strokeDasharray="339" strokeDashoffset={339 - (339*progress)/100} strokeLinecap="round"/></svg><div className="absolute inset-0 flex items-center justify-center font-bold text-2xl text-blue-900">{progress}%</div></div>
                                    <div className="ml-8 flex-1">
                                        <h3 className="font-bold text-gray-900 mb-3 text-lg">Status Global (Ativos)</h3>
                                        <div className="space-y-3">
                                            <div className="flex items-center justify-between bg-emerald-50 p-2 rounded-lg border border-emerald-100">
                                                <span className="text-xs font-bold text-emerald-700 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> Concluídas</span>
                                                <span className="text-sm font-extrabold text-emerald-800">{completedActiveTasks}</span>
                                            </div>
                                            <div className="flex items-center justify-between bg-amber-50 p-2 rounded-lg border border-amber-100">
                                                <span className="text-xs font-bold text-amber-700 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-amber-500"></div> Pendentes</span>
                                                <span className="text-sm font-extrabold text-amber-800">{totalActiveTasks - completedActiveTasks}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex flex-col justify-center h-auto min-h-[14rem]">
                                    <h3 className="font-bold text-gray-900 mb-4 flex items-center gap-2"><Users size={18} className="text-blue-600"/> Carga de Trabalho</h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                        {workload.map(m => (
                                            <div key={m.id} onClick={() => onMemberClick(m)} className="flex items-center gap-3 p-2 rounded-xl border border-gray-50 hover:bg-gray-50 hover:border-gray-200 transition-all cursor-pointer group bg-white shadow-sm">
                                                <div className="relative shrink-0"><Avatar member={m} size="w-10 h-10"/>{m.total > 0 && (<div className={`absolute -top-1 -right-1 w-4 h-4 rounded-full flex items-center justify-center text-[9px] text-white font-bold border border-white ${m.total > 5 ? 'bg-blue-600' : 'bg-blue-400'}`}>{m.total}</div>)}</div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-[11px] font-bold text-gray-800 truncate">{m.name.split(' ')[0]}</p>
                                                    <div className="flex gap-2 mt-0.5">
                                                        <span className="text-[9px] font-bold text-amber-600 flex items-center gap-0.5" title="Pendentes"><div className="w-1.5 h-1.5 rounded-full bg-amber-500"></div> {m.pending}</span>
                                                        <span className="text-[9px] font-bold text-emerald-600 flex items-center gap-0.5" title="Concluídas"><div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div> {m.done}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-xl font-bold text-blue-950 flex items-center gap-2">
                                    {eventViewMode === 'active' ? <Clock size={24}/> : <CheckSquare size={24}/>} 
                                    {eventViewMode === 'active' ? 'Eventos em Andamento' : 'Eventos Concluídos'}
                                </h2>
                                <div className="bg-white p-1 rounded-xl border border-gray-200 flex shadow-sm">
                                    <button onClick={() => setEventViewMode('active')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2 ${eventViewMode === 'active' ? 'bg-blue-100 text-blue-800 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`}><Clock size={14}/> Em Andamento</button>
                                    <button onClick={() => setEventViewMode('completed')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2 ${eventViewMode === 'completed' ? 'bg-emerald-100 text-emerald-800 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`}><CheckSquare size={14}/> Concluídos</button>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-10 min-h-[200px]">
                                {eventsToDisplay.length === 0 ? (
                                    <div className="col-span-full flex flex-col items-center justify-center py-12 opacity-50 bg-white rounded-2xl border border-dashed border-gray-200">
                                        <div className="bg-gray-50 p-4 rounded-full mb-3 text-gray-400">{eventViewMode === 'active' ? <Rocket size={32}/> : <Archive size={32}/>}</div>
                                        <p className="text-sm font-bold text-gray-500">{eventViewMode === 'active' ? 'Nenhum evento ativo no momento.' : 'Nenhum evento concluído ainda.'}</p>
                                    </div>
                                ) : (
                                    eventsToDisplay.map(evt => (
                                        <div key={evt.id} onClick={() => onSelectEvent(evt)} className={`bg-white rounded-xl border shadow-sm hover:shadow-lg transition-all cursor-pointer group overflow-hidden aspect-square flex flex-col relative transform hover:-translate-y-1 ${eventViewMode === 'completed' ? 'grayscale border-gray-200' : 'border-gray-100'}`}>
                                            <div className="flex-1 bg-slate-100 relative overflow-hidden">
                                                {evt.coverUrl && <img src={evt.coverUrl} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"/>}
                                                {!evt.coverUrl && <div className="absolute inset-0 bg-gradient-to-tr from-blue-100 to-indigo-50"></div>}
                                                {eventViewMode === 'active' && <div className="absolute top-2 right-2 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-md text-[10px] font-bold shadow-sm text-blue-900 border border-white/50">{getDaysLeft(evt)} dias</div>}
                                                {eventViewMode === 'completed' && <div className="absolute inset-0 bg-white/10 flex items-center justify-center"><div className="bg-emerald-500 text-white p-2 rounded-full shadow-lg"><Check size={20}/></div></div>}
                                                {evt.driveLink && <div className="absolute top-2 left-2 bg-white/90 backdrop-blur-sm p-1.5 rounded-md shadow-sm border border-white/50" title="Possui pasta no Drive"><img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" className="w-3.5 h-3.5" /></div>}
                                            </div>
                                            <div className="p-3 shrink-0 bg-white border-t border-gray-50">
                                                <h3 className="font-bold text-gray-900 mb-0.5 truncate text-sm">{evt.title}</h3>
                                                <p className="text-[10px] text-gray-500 flex items-center gap-1"><MapPin size={10}/> {evt.location || 'Local a definir'}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const EventDetail = ({ event, onBack, tasks, members, currentUser, onUpdateTask, onUpdateEvent, categories, onOpenCategorySettings, onAddTask, onDeleteTask, onAddTeamMember, onRemoveTeamMember, onDeleteEvent, onCreateMember, createNotification }) => {
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [selectedTaskId, setSelectedTaskId] = useState(null); 
            const [filterPhase, setFilterPhase] = useState('all');
            const [viewGrouping, setViewGrouping] = useState('category'); 
            const [isEditEventOpen, setIsEditEventOpen] = useState(false);
            const [isAddTeamOpen, setIsAddTeamOpen] = useState(false);
            const [isCreatingMember, setIsCreatingMember] = useState(false);
            const [tempMemberName, setTempMemberName] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [memberFilter, setMemberFilter] = useState('');
            const [expandedCategories, setExpandedCategories] = useState([]);

            const toggleCategory = (id) => { setExpandedCategories(prev => prev.includes(id) ? [] : [id]); };

            const selectedTask = tasks.find(t => t.id === selectedTaskId);

            const handleDragStart = (e, task) => { e.dataTransfer.setData("taskId", task.id); };
            const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); };

            const handleDrop = (e, targetId, targetType, targetTaskOrder) => { 
                e.preventDefault(); e.stopPropagation();
                const taskId = e.dataTransfer.getData("taskId"); 
                const droppedTask = tasks.find(t => t.id == taskId);
                if (!droppedTask) return;

                if (viewGrouping === 'status') {
                    if (targetType === 'column') { onUpdateTask(parseInt(taskId), { status: targetId, order: Date.now() }); } 
                    else if (targetType === 'task') { onUpdateTask(parseInt(taskId), { status: targetId, order: targetTaskOrder - 1 }); }
                } else {
                     if (targetType === 'column') { onUpdateTask(parseInt(taskId), { category: targetId, order: Date.now() }); } 
                     else if (targetType === 'task') { onUpdateTask(parseInt(taskId), { category: targetId, order: targetTaskOrder - 1 }); }
                }
            };
            
            const filteredTasks = tasks.filter(t => {
                if (t.eventId !== event.id) return false;
                if (filterPhase !== 'all' && t.phase !== filterPhase) return false;
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    const textMatch = t.text.toLowerCase().includes(query);
                    const subtaskMatch = t.subtasks && t.subtasks.some(sub => sub.text.toLowerCase().includes(query));
                    if (!textMatch && !subtaskMatch) return false;
                }
                if (memberFilter && t.responsible?.id !== memberFilter) return false;
                return true;
            }).sort((a, b) => (a.order || 0) - (b.order || 0));

            const handleAddAgenda = (item) => onUpdateEvent(event.id, { agenda: [...(event.agenda||[]), item] });
            const handleDeleteAgenda = (id) => onUpdateEvent(event.id, { agenda: (event.agenda||[]).filter(a=>a.id!==id) });
            const handleUpdateAgenda = (id, newItem) => { const newAgenda = (event.agenda || []).map(a => a.id === id ? { ...a, ...newItem } : a); onUpdateEvent(event.id, { agenda: newAgenda }); };
            const cyclePriority = (task) => { const map = { low: 'medium', medium: 'high', high: 'low' }; onUpdateTask(task.id, { priority: map[task.priority || 'low'] }); };
            
            const eventTeam = [members.find(m => m.id === event.responsibleId), ...members.filter(m => event.teamIds?.includes(m.id) && m.id !== event.responsibleId)].filter(Boolean);

            const handleCreateTempMember = () => {
                if(!tempMemberName.trim()) return;
                const newId = Date.now().toString();
                const newMember = { id: newId, name: tempMemberName, role: 'Temporário', photoUrl: null, active: true }; 
                onCreateMember(newMember);
                onAddTeamMember(event.id, newId);
                setTempMemberName(''); setIsCreatingMember(false);
            };

            const columns = useMemo(() => {
                if (viewGrouping === 'status') return STATUS_COLUMNS;
                const cats = event.categories || DEFAULT_CATEGORIES;
                if (filterPhase === 'all') return cats;
                return cats.filter(c => !c.phases || c.phases.length === 0 || c.phases.includes(filterPhase));
            }, [viewGrouping, event.categories, filterPhase]);

            const totalEventCost = filteredTasks.reduce((acc, t) => acc + (t.cost || 0), 0);
            const daysLeft = getDaysLeft(event);
            const daysLeftText = daysLeft < 0 ? `Terminou há ${Math.abs(daysLeft)} dias` : daysLeft === 0 ? "É hoje!" : `Faltam ${daysLeft} dias`;
            const formatDate = (d) => { if (!d) return ''; const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; };

            return (
                <div className="min-h-screen bg-[#F8FAFC] pb-24 animate-in">
                    {/* HERO SECTION */}
                    <div className="h-64 sm:h-72 bg-slate-900 relative rounded-b-[2.5rem] shadow-sm overflow-hidden mb-6 group/hero">
                        {event.coverUrl ? (
                            <img src={event.coverUrl} className="w-full h-full object-cover opacity-50 mix-blend-overlay transition-transform duration-[10s] group-hover/hero:scale-105"/>
                        ) : (
                            <div className="absolute inset-0 bg-gradient-to-r from-blue-900 to-indigo-900 opacity-80"></div>
                        )}
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent"></div>
                        
                        <button onClick={onBack} className="absolute top-6 left-6 p-2.5 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white transition-all shadow-sm"><ArrowLeft size={20}/></button>
                        <button onClick={() => setIsEditEventOpen(true)} className="absolute top-6 right-6 p-2.5 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white transition-all shadow-sm"><Settings size={20}/></button>

                        <div className="absolute bottom-6 left-6 right-6">
                            <h1 className="text-3xl lg:text-4xl font-extrabold text-white mb-3 drop-shadow-md">{event.title}</h1>
                            <div className="flex flex-wrap items-center gap-3 mb-3">
                                 <span className="text-xs font-bold text-slate-900 bg-white px-3 py-1.5 rounded-full inline-flex items-center gap-1.5 shadow-lg">
                                    <Clock size={14} className="text-blue-600"/> {daysLeftText} • {formatDate(event.startDate)} {event.endDate && event.endDate !== event.startDate ? `- ${formatDate(event.endDate)}` : ''}
                                 </span>
                                 <span className="text-xs text-white font-medium bg-white/20 backdrop-blur-md border border-white/30 px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-lg">
                                    <MapPin size={14}/> {event.location || 'Local não definido'}
                                 </span>
                                 
                                 {event.driveLink ? (
                                     <a href={event.driveLink} target="_blank" rel="noopener noreferrer" className="text-xs bg-white text-gray-800 px-4 py-1.5 rounded-full flex items-center gap-2 font-bold transition-all shadow-lg hover:shadow-xl hover:scale-105 active:scale-95 group">
                                         <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive" className="w-4 h-4 group-hover:animate-pulse" />
                                         Acessar Pasta do Drive
                                     </a>
                                 ) : (
                                     <button onClick={() => setIsEditEventOpen(true)} className="text-xs bg-white/10 hover:bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-1.5 rounded-full flex items-center gap-1.5 font-bold transition-all border-dashed shadow-lg">
                                         <Plus size={14}/> Adicionar Drive
                                     </button>
                                 )}
                            </div>
                            <div className="inline-flex">
                                <p className="text-sm font-bold text-emerald-400 flex items-center gap-1.5 bg-slate-900/50 backdrop-blur-md px-3 py-1.5 rounded-lg border border-emerald-500/30 shadow-lg">
                                    <DollarSign size={16}/> Custo Total: {formatCurrency(totalEventCost)}
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-[1800px] mx-auto px-6 grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <div className="lg:col-span-1 space-y-6">
                            <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-gray-800 flex items-center gap-2"><Users size={16} className="text-blue-600"/> Equipe do Evento</h3>
                                    <div className="flex gap-1">
                                        <button onClick={()=>setIsAddTeamOpen(!isAddTeamOpen)} className="text-blue-600 hover:bg-blue-100 p-1.5 rounded-lg bg-blue-50 transition-colors" title="Adicionar existente"><UserPlus size={16}/></button>
                                        <button onClick={()=>setIsCreatingMember(!isCreatingMember)} className="text-emerald-600 hover:bg-emerald-100 p-1.5 rounded-lg bg-emerald-50 transition-colors" title="Criar Novo"><Plus size={16}/></button>
                                    </div>
                                </div>
                                
                                {isCreatingMember && (
                                    <div className="mb-3 p-2 bg-emerald-50 rounded-lg border border-emerald-100 animate-in">
                                        <p className="text-[10px] font-bold text-emerald-700 uppercase mb-1">Novo Colaborador</p>
                                        <div className="flex gap-1">
                                            <input className="flex-1 p-1.5 text-xs border border-emerald-200 rounded outline-none focus:border-emerald-400" placeholder="Nome..." value={tempMemberName} onChange={e => setTempMemberName(e.target.value)} autoFocus/>
                                            <button onClick={handleCreateTempMember} className="bg-emerald-600 hover:bg-emerald-700 transition-colors text-white px-2 rounded text-xs font-bold shadow-sm"><Check size={14}/></button>
                                        </div>
                                    </div>
                                )}

                                {isAddTeamOpen && (<div className="mb-3 p-2 bg-blue-50 rounded-lg max-h-32 overflow-y-auto animate-in border border-blue-100">{members.filter(m => !eventTeam.some(et => et.id === m.id) && m.active !== false).map(m => (<div key={m.id} className="flex justify-between items-center p-1 hover:bg-white rounded cursor-pointer transition-colors" onClick={() => { onAddTeamMember(event.id, m.id); setIsAddTeamOpen(false); }}><div className="flex items-center gap-2"><Avatar member={m} size="w-5 h-5"/><span className="text-xs font-medium text-gray-700">{m.name}</span></div><Plus size={12} className="text-blue-500"/></div>))} {members.filter(m => !eventTeam.some(et => et.id === m.id) && m.active !== false).length === 0 && <p className="text-[10px] text-gray-400 text-center">Todos já estão no time.</p>}</div>)}
                                
                                <div className="space-y-3">{eventTeam.map(m => (<div key={m.id} className="flex items-center gap-3 group"><Avatar member={m}/><div className="flex-1 min-w-0"><p className={`text-xs font-bold truncate ${m.active === false ? 'text-gray-400' : ''}`}>{m.name}</p><p className="text-[10px] text-gray-500 truncate">{m.role}</p></div>{m.id === event.responsibleId ? <Crown size={14} className="text-amber-500" title="Responsável Geral"/> : <button onClick={() => onRemoveTeamMember(event.id, m.id)} className="text-red-400 hover:text-red-600 hover:bg-red-50 p-1 rounded opacity-0 group-hover:opacity-100 transition-all"><X size={14}/></button>}</div>))}</div>
                            </div>
                            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden flex flex-col h-[500px] hover:shadow-md transition-shadow">
                                <div className="p-4 border-b bg-gray-50/50 font-bold text-gray-800 flex items-center gap-2"><CalendarIcon size={16} className="text-blue-600"/> Agenda do Evento</div>
                                <div className="flex-1 overflow-visible">
                                    <AgendaComponent agendaItems={event.agenda || []} selectedDateFilter={null} onAdd={handleAddAgenda} onDelete={handleDeleteAgenda} onUpdate={handleUpdateAgenda} contextTitle="" scrollable={true} />
                                </div>
                            </div>
                        </div>
                        <div className="lg:col-span-3 space-y-6 flex flex-col">
                            <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow flex flex-col xl:flex-row justify-between gap-4 items-start xl:items-center">
                                {/* Filtros Fases */}
                                <div className="flex bg-gray-50 p-1.5 rounded-xl border border-gray-100 shrink-0 overflow-x-auto max-w-full">
                                    {['all', 'pre', 'during', 'post'].map(ph => (
                                        <button key={ph} onClick={()=>setFilterPhase(ph)} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${filterPhase===ph ? 'bg-white shadow-sm text-blue-700 ring-1 ring-gray-200' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>
                                            {ph === 'all' ? 'Todos' : ph === 'pre' ? 'Pré' : ph === 'during' ? 'Durante' : 'Pós'}
                                        </button>
                                    ))}
                                </div>

                                {/* Busca */}
                                <div className="flex-1 flex flex-col sm:flex-row gap-3 w-full">
                                    <div className="relative flex-1">
                                        <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
                                        <input className="w-full pl-9 pr-3 py-2 text-xs border rounded-xl bg-gray-50 focus:bg-white outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-50 transition-all" placeholder="Buscar tarefa ou complemento..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/>
                                    </div>
                                    <select className="p-2 text-xs border rounded-xl bg-gray-50 outline-none min-w-[140px] text-gray-700 cursor-pointer hover:bg-white focus:border-blue-300 focus:ring-2 focus:ring-blue-50 transition-all" value={memberFilter} onChange={e=>setMemberFilter(e.target.value)}>
                                        <option value="">Todos Responsáveis</option>
                                        {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                    </select>
                                </div>

                                {/* Ações */}
                                <div className="flex items-center gap-2 shrink-0">
                                    <div className="flex bg-gray-50 p-1.5 rounded-xl border border-gray-100 mr-1">
                                        <button onClick={() => setViewGrouping('category')} className={`p-1.5 rounded-lg transition-all ${viewGrouping === 'category' ? 'bg-white shadow-sm text-blue-600 ring-1 ring-gray-200' : 'text-gray-400 hover:bg-gray-100'}`} title="Ver por Categoria"><Grid size={16}/></button>
                                        <button onClick={() => setViewGrouping('status')} className={`p-1.5 rounded-lg transition-all ${viewGrouping === 'status' ? 'bg-white shadow-sm text-blue-600 ring-1 ring-gray-200' : 'text-gray-400 hover:bg-gray-100'}`} title="Ver por Status"><Columns size={16}/></button>
                                    </div>
                                    <button onClick={onOpenCategorySettings} className="p-2 border border-gray-200 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-blue-600 transition-colors bg-white shadow-sm" title="Ajustes de Categoria"><Settings size={16}/></button>
                                    <button onClick={onAddTask} className="px-4 py-2 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl text-xs font-bold hover:shadow-lg hover:-translate-y-0.5 transition-all flex items-center gap-2"><Plus size={14}/> Nova Tarefa</button>
                                </div>
                            </div>
                            
                            {/* BOARD */}
                            <div className={`${viewGrouping === 'status' ? 'flex overflow-x-auto gap-4 pb-4 items-start' : 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 items-start pb-4'}`}>
                                {columns.map(col => {
                                    const colTasks = filteredTasks.filter(t => viewGrouping === 'status' ? t.status === col.id : t.category === col.id);
                                    
                                    // CATEGORY VIEW 
                                    if (viewGrouping === 'category') {
                                        const isExpanded = expandedCategories.includes(col.id);
                                        const catResponsible = members.find(m => m.id === col.responsibleId);
                                        return (
                                            <div key={col.id} className={`bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden transition-all flex flex-col ${isExpanded ? 'col-span-full ring-2 ring-blue-400 shadow-lg z-10 order-first lg:order-none' : 'hover:shadow-md hover:border-gray-300'}`} onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, col.id, 'column')}>
                                                <div onClick={() => toggleCategory(col.id)} className={`flex items-center justify-between p-4 cursor-pointer transition-colors ${isExpanded ? 'bg-blue-50/50' : 'hover:bg-gray-50'}`}>
                                                    <div className="flex items-center gap-3">
                                                        <div className={`p-2.5 rounded-xl shadow-sm bg-${col.color}-100 text-${col.color}-700 border border-${col.color}-200`}>
                                                            {React.createElement(ICON_MAP[col.icon] || Box, { size: 20 })}
                                                        </div>
                                                        <div className="flex flex-col">
                                                            <h3 className="font-bold text-gray-800 text-sm md:text-base flex items-center gap-2">
                                                                {col.title}
                                                                {catResponsible && !isExpanded && (
                                                                    <Avatar member={catResponsible} size="w-5 h-5" title={`Responsável: ${catResponsible.name}`} />
                                                                )}
                                                            </h3>
                                                            {catResponsible && isExpanded && (
                                                                <span className="text-[10px] text-gray-500 flex items-center gap-1 mt-0.5"><UserCheck size={10}/> Resp: {catResponsible.name}</span>
                                                            )}
                                                        </div>
                                                        <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${isExpanded ? 'bg-blue-200 text-blue-800' : 'bg-gray-100 text-gray-500'}`}>{colTasks.length}</span>
                                                    </div>
                                                    <div className={`p-1 rounded-full transition-transform ${isExpanded ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-400'}`}>{isExpanded ? <ChevronUp size={16}/> : <ChevronDown size={16}/>}</div>
                                                </div>

                                                {isExpanded && (
                                                    <div className="p-5 bg-[#fcfcfc] border-t border-gray-100 animate-in space-y-4">

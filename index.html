        const compressImage = (file, maxWidth = 800) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        if (ctx) {
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.7));

                };

            const today = new Date();
            today.setHours(0,0,0,0);
            const diff = target - today;
            return Math.ceil(diff / (86400000));

        const Avatar = ({ member, size = "w-10 h-10", title }) => {
            if (!member) return <div className={`${size} rounded-full bg-gray-200 border border-gray-300`} title={title}></div>;
            const inactiveClass = member.active === false ? "grayscale opacity-60" : "";
            const content = member.photoUrl ? (
                <img src={member.photoUrl} className={`w-full h-full object-cover ${inactiveClass}`} alt={member.name} />
            ) : (
                <div className={`w-full h-full flex items-center justify-center font-bold text-[10px] ${inactiveClass} ${member.active === false ? 'bg-gray-100 text-gray-400' : 'text-blue-900'}`}>
                    {member.name?.substring(0,2).toUpperCase()}
                </div>
            );
            return (
                <div className={`${size} rounded-full bg-white border border-gray-200 relative flex-shrink-0 overflow-hidden`} title={title || member.name}>
                    {content}
                </div>
            );
        };

        const FlagPriority = ({ level, onClick }) => {
            const colors = { high: "text-red-500 hover:text-red-600", medium: "text-amber-500 hover:text-amber-600", low: "text-emerald-500 hover:text-emerald-600" };
            return (
                <button onClick={(e) => { e.stopPropagation(); onClick && onClick(); }} className={`transition-transform hover:scale-110 ${colors[level] || colors.low}`} title="Alterar Prioridade">
                    <Flag size={16} fill="currentColor"/>
                </button>
            );
        };

        const Modal = ({ isOpen, onClose, title, children, maxWidth = "max-w-lg", hideHeader = false, fullScreen = false }) => {
            if (!isOpen) return null;
            const content = (
                <div className={`bg-white ${fullScreen ? 'fixed inset-0 z-[100] flex flex-col' : `rounded-2xl shadow-2xl w-full ${maxWidth} max-h-[90vh] overflow-hidden flex flex-col bg-white relative z-[100]`}`}>
                    {!hideHeader && (
                        <div className="p-4 border-b bg-[#1e1b4b] text-white flex justify-between items-center shrink-0">
                            <h3 className="font-bold">{title}</h3>
                            <button onClick={onClose} className="hover:bg-white/20 p-1 rounded-md transition-colors"><X size={20}/></button>
                        </div>
                    )}
                    {hideHeader && <button onClick={onClose} className="absolute top-4 right-4 z-50 p-2 bg-black/10 hover:bg-black/20 rounded-full text-white"><X size={20}/></button>}
                    <div className="p-0 overflow-y-auto flex-1 bg-white relative">{children}</div>
                </div>
            );
            return createPortal(
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 animate-in">{content}</div>,
                document.body
            );
        };

        const ProfileSelectionScreen = ({ members, onSelect }) => {
            const [selectedProfile, setSelectedProfile] = useState(null);
            const [passwordInput, setPasswordInput] = useState('');
            const [error, setError] = useState(false);

            const handleSelectClick = (m) => {
                if (m.password) {
                    setSelectedProfile(m);
                    setPasswordInput('');
                    setError(false);
                } else {
                    onSelect(m.id);
                }
            };

            const handleLogin = () => {
                if (passwordInput === selectedProfile.password) {
                    onSelect(selectedProfile.id);
                } else {
                    setError(true);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 to-blue-900 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-in">
                        <div className="h-32 bg-blue-950 flex items-center justify-center relative overflow-hidden">
                            <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>

                        {!selectedProfile ? (

                                </div>
                                
                                <div className="w-full space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                                    {members.filter(m => m.active !== false).map(m => (
                                        <button 
                                            key={m.id}
                                            onClick={() => handleSelectClick(m)}
                                            className="w-full flex items-center gap-3 p-3 rounded-xl border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition-all text-left bg-white group"
                                        >
                                            <Avatar member={m} size="w-10 h-10"/>
                                            <div className="flex-1">
                                                <p className="font-bold text-gray-800 text-sm group-hover:text-blue-700 transition-colors">{m.name}</p>
                                                <p className="text-[10px] text-gray-500">{m.role}</p>
                                            </div>
                                            {m.password && <Lock size={14} className="text-gray-300 group-hover:text-blue-500 mr-2"/>}
                                            <ChevronRight size={16} className="text-gray-300 group-hover:text-blue-500"/>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="p-8 flex flex-col items-center text-center space-y-6 animate-in">
                                <button onClick={() => setSelectedProfile(null)} className="self-start flex items-center gap-1 text-xs font-bold text-gray-500 hover:text-blue-600 transition-colors"><ArrowLeft size={14}/> Voltar</button>
                                <div className="flex flex-col items-center">
                                    <Avatar member={selectedProfile} size="w-20 h-20"/>
                                    <h2 className="text-xl font-bold text-gray-800 mt-4">{selectedProfile.name}</h2>
                                    <p className="text-sm text-gray-500">Digite sua senha de acesso</p>
                                </div>
                                
                                <div className="w-full space-y-3">
                                    <input 
                                        type="password" 
                                        className={`w-full p-4 border rounded-xl text-center font-bold tracking-widest outline-none transition-colors ${error ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-200 bg-gray-50 focus:border-blue-500'}`}
                                        placeholder="Sua senha..."
                                        value={passwordInput}
                                        onChange={e => { setPasswordInput(e.target.value); setError(false); }}
                                        onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                        autoFocus
                                    />
                                    {error && <p className="text-xs text-red-500 font-bold">Senha incorreta. Tente novamente.</p>}
                                    <button onClick={handleLogin} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">Entrar</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const BellOff = ({size, className}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M13.73 21a2 2 0 0 1-3.46 0"></path><path d="M18.63 13A17.89 17.89 0 0 1 18 8"></path><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"></path><path d="M18 8a6 6 0 0 0-9.33-5"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;

        const NotificationCenter = ({ notifications, currentUser, onMarkAsRead, onClearAll, tasks }) => {
            const [isOpen, setIsOpen] = useState(false);
            
            const dynamicDeadlines = useMemo(() => {
                if(!currentUser) return [];
                const myActiveTasks = tasks.filter(t => t.responsible?.id === currentUser.id && t.status !== 'done' && t.deliveryDate);
                const now = new Date();
                return myActiveTasks.filter(t => {
                    const diffTime = new Date(t.deliveryDate) - now;
                    return diffTime > 0 && diffTime <= 2 * 24 * 60 * 60 * 1000;
                }).map(t => ({
                    id: `dl-${t.id}`,
                    userId: currentUser.id,
                    title: "Prazo Próximo!",
                    text: `A tarefa "${t.text}" vence em ${new Date(t.deliveryDate).toLocaleDateString('pt-BR')}.`,
                    taskId: t.id,
                    read: false,
                    isDynamic: true,
                    createdAt: new Date().toISOString()
                }));
            }, [tasks, currentUser]);

            const allNotifs = [...dynamicDeadlines, ...notifications]
                .filter(n => n.userId === currentUser?.id)
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            const unreadCount = allNotifs.filter(n => !n.read).length;

            const handleItemClick = (n) => {
                if(!n.isDynamic && !n.read) onMarkAsRead(n.id);
            };

            return (
                <div className="relative">
                    <button 
                        onClick={() => setIsOpen(!isOpen)} 
                        className="relative p-2.5 bg-white border border-gray-200 rounded-full text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition-all shadow-sm"
                    >
                        {unreadCount > 0 ? <BellRing size={20} className="text-blue-600 animate-pulse"/> : <Bell size={20}/>}
                        {unreadCount > 0 && (
                            <span className="absolute top-0 right-0 w-4 h-4 bg-red-500 border-2 border-white text-white text-[9px] font-bold flex items-center justify-center rounded-full shadow-sm">
                                {unreadCount > 9 ? '9+' : unreadCount}
                            </span>
                        )}
                    </button>

                    {isOpen && (
                        <div className="absolute top-full right-0 mt-3 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-gray-200 z-[300] overflow-hidden animate-in">
                            <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2"><Bell size={16} className="text-blue-600"/> Notificações</h3>
                                {allNotifs.length > 0 && (
                                    <button onClick={() => { onClearAll(); setIsOpen(false); }} className="text-[10px] font-bold text-gray-400 hover:text-blue-600">Limpar Tudo</button>
                                )}
                            </div>
                            <div className="max-h-[400px] overflow-y-auto bg-white p-2 space-y-1">
                                {allNotifs.length === 0 ? (
                                    <div className="p-6 text-center text-gray-400 flex flex-col items-center">
                                        <div className="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mb-2"><BellOff size={20} className="text-gray-300"/></div>
                                        <p className="text-sm">Nenhuma notificação nova.</p>
                                    </div>
                                ) : (
                                    allNotifs.map(n => (
                                        <div 
                                            key={n.id} 
                                            onClick={() => handleItemClick(n)}
                                            className={`p-3 rounded-xl cursor-pointer transition-all border ${n.read ? 'bg-white border-transparent text-gray-500' : 'bg-blue-50/50 border-blue-100 text-gray-800'}`}
                                        >
                                            <div className="flex justify-between items-start mb-1">
                                                <span className={`text-xs font-bold flex items-center gap-1 ${n.isDynamic ? 'text-amber-600' : 'text-blue-700'}`}>
                                                    {n.isDynamic ? <Timer size={12}/> : <MessageSquare size={12}/>} {n.title}
                                                </span>
                                                <span className="text-[9px] opacity-60">{new Date(n.createdAt).toLocaleDateString('pt-BR')}</span>
                                            </div>
                                            <p className={`text-xs leading-relaxed ${n.read ? 'text-gray-500' : 'text-gray-700 font-medium'}`}>{n.text}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}
                    {isOpen && <div className="fixed inset-0 z-[290]" onClick={() => setIsOpen(false)}></div>}
                </div>
            );
        };

        const AIAssistant = ({ isOpen, onClose, context, apiKey }) => {
            const [messages, setMessages] = useState([{ sender: 'ai', text: "Olá! Eu sou o assistente de IA do Event Hub. Selecione uma opção abaixo ou digite sua pergunta." }]);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            const QUICK_QUESTIONS = ["📅 Resumo dos Eventos", "💰 Custo Total", "👥 Carga da Equipe", "✅ Minhas Tarefas", "🚨 Urgências"];

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isTyping]);

            const callGeminiAPI = async (prompt, systemContext) => {
                if (!apiKey) return null;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemContext }] } })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    console.error("Gemini API Error", error);
                    return null;
                }
            };

            const processQuery = async (text) => {
                const userMsg = { sender: 'user', text };
                setMessages(prev => [...prev, userMsg]);
                setIsTyping(true);

                const { events, tasks, members } = context;
                const eventsSummary = events.map(e => `• ID: ${e.id}, Evento: "${e.title}", Custo: R$${tasks.filter(t => t.eventId === e.id).reduce((acc, t) => acc + (t.cost || 0), 0)}, Tarefas Pendentes: ${tasks.filter(t => t.eventId === e.id && t.status !== 'done').length}`).join('\n');
                const tasksSummary = tasks.map(t => `• Tarefa: "${t.text}", Status: ${t.status}, Prioridade: ${t.priority}, Responsável: ${t.responsible?.name || 'N/A'}, Custo: R$${t.cost || 0}`).join('\n');
                const membersSummary = members.map(m => `• Nome: ${m.name} (${m.role})`).join('\n');

                const systemPrompt = `Você é um assistente pessoal inteligente do sistema "Event Hub"...\n\n[EQUIPE]\n${membersSummary}\n---\n[EVENTOS]\n${eventsSummary}\n---\n[TODAS AS TAREFAS]\n${tasksSummary}`;

                let responseText = "Desculpe, não consegui processar a resposta no momento.";
                const aiResponse = await callGeminiAPI(text, systemPrompt);
                if (aiResponse) responseText = aiResponse;
                else responseText = "Não consegui conectar com a IA. Verifique sua chave API nas configurações de Segurança.";

                setMessages(prev => [...prev, { sender: 'ai', text: responseText }]);
                setIsTyping(false);
            };

            const handleSend = async () => { if(!input.trim()) return; const txt = input; setInput(""); await processQuery(txt); };

            if(!isOpen) return null;

            return (
                <div className="fixed bottom-24 right-6 w-80 md:w-96 h-[500px] bg-white rounded-2xl shadow-2xl z-[200] flex flex-col border border-gray-200 animate-in overflow-hidden">
                    <div className="p-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white flex justify-between items-center">
                        <div className="flex items-center gap-2"><Sparkles size={18}/> <span className="font-bold">Assistente IA</span></div>
                        <button onClick={onClose}><X size={18}/></button>
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] p-3 rounded-xl text-sm ${m.sender === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border border-gray-200 text-gray-700 rounded-tl-none shadow-sm'}`} style={{whiteSpace: 'pre-wrap'}}>{m.text}</div>
                            </div>
                        ))}
                        {isTyping && <div className="flex justify-start"><div className="bg-white border border-gray-100 p-3 rounded-xl rounded-tl-none shadow-sm flex gap-1"><div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div><div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div><div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div></div></div>}
                        <div ref={messagesEndRef}></div>
                    </div>
                    <div className="px-4 py-2 bg-gray-50 border-t border-gray-100 overflow-x-auto flex gap-2 hide-scrollbar">
                        {QUICK_QUESTIONS.map((q, i) => (<button key={i} onClick={() => processQuery(q)} className="whitespace-nowrap px-3 py-1.5 bg-white border border-blue-200 rounded-full text-xs font-medium text-blue-700 hover:bg-blue-50 transition-colors shadow-sm">{q}</button>))}
                    </div>
                    <div className="p-3 bg-white border-t flex gap-2">
                        <input className="flex-1 bg-gray-100 border-none outline-none rounded-lg px-3 py-2 text-sm" placeholder="Digite sua pergunta..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()}/>
                        <button onClick={handleSend} className="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700"><Send size={18}/></button>
                    </div>
                </div>
            );
        };

        const AgendaComponent = ({ agendaItems, onAdd, onDelete, onUpdate, readOnly = false, contextTitle = "Agenda", selectedDateFilter, events, scrollable = true }) => {
            const [newItem, setNewItem] = useState({ title: '', date: '', color: 'blue', eventId: '' });
            const [isAdding, setIsAdding] = useState(false);
            const [editItem, setEditItem] = useState(null);

            const filteredItems = selectedDateFilter ? agendaItems.filter(item => item.date === selectedDateFilter) : agendaItems;
            const sortedItems = [...filteredItems].sort((a,b) => new Date(a.date) - new Date(b.date));

            const handleSave = () => {
                if(!newItem.title) return;
                const dateToAdd = newItem.date || selectedDateFilter || new Date().toISOString().split('T')[0];
                if (editItem) { onUpdate(editItem.id, { ...newItem, date: dateToAdd }); setEditItem(null); } 
                else { onAdd({ ...newItem, id: Date.now(), date: dateToAdd }); }
                setNewItem({ title: '', date: '', color: 'blue', eventId: '' });
                setIsAdding(false);
            };

            const startEdit = (item) => { setNewItem({ title: item.title, date: item.date, color: item.color, eventId: item.eventId || '' }); setEditItem(item); setIsAdding(true); };

            return (
                <div className="flex flex-col h-full bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div className="p-4 border-b bg-gray-50/50 flex justify-between items-center">
                        <h3 className="font-bold text-gray-800 flex items-center gap-2">
                            <CalendarIcon size={16} className="text-blue-600"/> 
                            {selectedDateFilter ? new Date(selectedDateFilter).toLocaleDateString('pt-BR') : contextTitle}
                        </h3>
                        {!readOnly && <button onClick={() => { setNewItem(prev => ({...prev, date: selectedDateFilter || prev.date})); setIsAdding(!isAdding); setEditItem(null); }} className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200 transition-colors">{isAdding ? 'Cancelar' : '+ Adicionar'}</button>}
                    </div>
                    {isAdding && (
                        <div className="p-3 bg-blue-50/50 border-b border-blue-100 animate-in space-y-2">
                            <input className="w-full p-2 text-xs border rounded bg-white" placeholder="Título..." value={newItem.title} onChange={e=>setNewItem({...newItem, title: e.target.value})} autoFocus/>
                            <div className="flex gap-2">
                                <input type="date" className="flex-1 p-2 text-xs border rounded bg-white" value={newItem.date} onChange={e=>setNewItem({...newItem, date: e.target.value})}/>
                                {events && <select className="flex-1 p-2 text-xs border rounded bg-white" value={newItem.eventId} onChange={e=>setNewItem({...newItem, eventId: e.target.value})}><option value="">Opcional: Evento</option>{events.map(ev => <option key={ev.id} value={ev.id}>{ev.title}</option>)}</select>}
                            </div>
                            <div className="flex gap-1 items-center">{AGENDA_COLORS.map(c => (<button key={c.id} onClick={()=>setNewItem({...newItem, color: c.id})} className={`w-5 h-5 rounded-full ${c.bg} border ${newItem.color === c.id ? 'border-gray-500 scale-110' : 'border-transparent'}`}></button>))}</div>
                            <button onClick={handleSave} className="w-full bg-blue-600 text-white px-3 rounded text-xs font-bold py-1">Salvar</button>
                        </div>
                    )}
                    <div className={`flex-1 p-2 space-y-2 ${scrollable ? 'overflow-y-auto max-h-[300px]' : ''}`}>
                        {sortedItems.length === 0 && <p className="text-center text-gray-400 text-xs py-4">Nenhum item.</p>}
                        {sortedItems.map(item => {
                            const color = AGENDA_COLORS.find(c => c.id === item.color) || AGENDA_COLORS[0];
                            const [y, m, d] = item.date.split('-');
                            return (
                                <div key={item.id} className="group flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 border border-transparent hover:border-gray-100 transition-all">
                                    <div className={`flex-shrink-0 w-12 h-12 rounded-lg ${color.bg} flex flex-col items-center justify-center text-[10px] font-bold ${color.text}`}><span>{d}</span></div>
                                    <div className="flex-1 min-w-0"><p className="text-xs font-bold text-gray-800 truncate">{item.title}</p>{item.eventName && <p className="text-[9px] text-gray-400 truncate">{item.eventName}</p>}</div>
                                    {!readOnly && <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => startEdit(item)} className="text-gray-300 hover:text-blue-500"><Edit2 size={14}/></button><button onClick={() => onDelete(item.id)} className="text-gray-300 hover:text-red-500"><Trash2 size={14}/></button></div>}
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const WorkloadDetailModal = ({ isOpen, onClose, member, memberTasks, allMembers, onUpdateTask, events }) => {
            if (!isOpen || !member) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Carga de Trabalho: ${member.name}`}>
                    <div className="p-6">
                        <div className="flex items-center gap-4 mb-6 p-4 bg-gray-50 rounded-xl border border-gray-100">
                            <div className="w-16 h-16 rounded-full overflow-hidden border-2 border-white shadow-md">
                                <Avatar member={member} size="w-full h-full"/>
                            </div>
                            <div>
                                <h3 className="font-bold text-lg text-gray-900">{member.name}</h3>
                                <p className="text-sm text-gray-500">{member.role}</p>
                                <span className="inline-block mt-2 text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full font-bold">{memberTasks.length} Tarefas Atribuídas</span>
                            </div>
                        </div>
                        <div className="space-y-3 max-h-80 overflow-y-auto pr-2">
                            {memberTasks.length === 0 && <p className="text-center text-sm text-gray-400">Nenhuma tarefa atribuída.</p>}
                            {memberTasks.map(t => {
                                const evt = events?.find(e => e.id === t.eventId);
                                const isDone = t.status === 'done';
                                return (
                                    <div key={t.id} className={`p-3 border rounded-xl flex flex-col transition-all group ${isDone ? 'bg-gray-50 border-gray-200' : 'bg-white border-blue-100 hover:shadow-sm'}`}>
                                        <div className="flex justify-between items-start mb-1">
                                            <span className={`text-sm font-bold truncate pr-4 ${isDone ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{t.text}</span>
                                            {isDone ? <CheckSquare size={16} className="text-emerald-500 shrink-0"/> : <Clock size={16} className="text-amber-500 shrink-0"/>}
                                        </div>
                                        <span className="text-[10px] text-gray-500 flex items-center gap-1">
                                            <CalendarIcon size={10}/> {evt?.title || 'Evento Desconhecido'}
                                        </span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </Modal>
            );
        };

        const ManageCategoriesModal = ({ isOpen, onClose, categories, onUpdateCategories, members }) => {
            const [cats, setCats] = useState(categories);
            const [newCat, setNewCat] = useState({ title: '', color: 'blue', icon: 'box', phases: ['pre','during','post'], responsibleId: '', subcategories: [] });
            const [editingId, setEditingId] = useState(null);
            
            useEffect(() => { setCats(categories); }, [categories]);
            
            const handleUpdate = (id, field, val) => { setCats(prev => prev.map(c => c.id === id ? { ...c, [field]: val } : c)); };
            const handleDelete = (id) => { if (confirm("Tem a certeza?")) setCats(prev => prev.filter(c => c.id !== id)); };
            const handleAdd = () => { 
                if (!newCat.title.trim()) return; 
                const uniqueId = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                setCats(prev => [...prev, { id: uniqueId, ...newCat }]); 
                setNewCat({ title: '', color: 'blue', icon: 'box', phases: ['pre','during','post'], responsibleId: '', subcategories: [] }); 
            };
            const save = () => { onUpdateCategories(cats); onClose(); };

            const togglePhase = (catId, p) => {
                if(catId === 'new') {
                    setNewCat(prev => { const cur = prev.phases||[]; return {...prev, phases: cur.includes(p) ? cur.filter(x=>x!==p) : [...cur, p]}; });
                } else {
                    setCats(prev => prev.map(c => {
                        if(c.id !== catId) return c;
                        const cur = c.phases||[];
                        return {...c, phases: cur.includes(p) ? cur.filter(x=>x!==p) : [...cur, p]};
                    }));
                }
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Ajustes de Categorias" maxWidth="max-w-3xl">
                    <div className="p-6">
                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6">
                            <h4 className="text-xs font-bold text-blue-800 uppercase mb-3">Nova Categoria Principal</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-3">
                                    <input className="w-full p-2 border rounded-lg text-sm bg-white" placeholder="Nome da Categoria..." value={newCat.title} onChange={e=>setNewCat({...newCat, title: e.target.value})}/>
                                    <div>
                                        <span className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Responsável pela Categoria:</span>
                                        <select className="w-full p-2 text-sm border rounded-lg bg-white" value={newCat.responsibleId || ''} onChange={e=>setNewCat({...newCat, responsibleId: e.target.value})}>
                                            <option value="">Nenhum</option>
                                            {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <span className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Fases do Evento:</span>
                                        <div className="flex gap-2 flex-wrap">
                                            {[{id: 'pre', label: 'Pré'}, {id: 'during', label: 'Durante'}, {id: 'post', label: 'Pós'}].map(phase => (
                                                <label key={phase.id} className="flex items-center gap-1 text-xs bg-white px-2 py-1 rounded border border-blue-200 cursor-pointer">
                                                    <input type="checkbox" checked={newCat.phases?.includes(phase.id)} onChange={() => togglePhase('new', phase.id)} className="rounded text-blue-600"/> {phase.label}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <div className="flex gap-2 items-center mb-3">
                                        <span className="text-[10px] font-bold text-gray-500 uppercase">Cor:</span>
                                        {PASTEL_COLORS.map(c => (<button key={c.id} onClick={() => setNewCat({...newCat, color: c.id})} className={`w-5 h-5 rounded-full ${c.bg} border-2 ${newCat.color === c.id ? 'border-gray-600 scale-110' : 'border-transparent'}`}></button>))}
                                    </div>
                                    <div>
                                        <span className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Ícone:</span>
                                        <div className="grid grid-cols-7 gap-1 bg-white p-2 rounded-lg border max-h-24 overflow-y-auto">
                                            {ICON_KEYS.map(iconKey => { const Icon = ICON_MAP[iconKey]; return (<button key={iconKey} onClick={() => setNewCat({...newCat, icon: iconKey})} className={`p-1.5 rounded hover:bg-gray-100 flex justify-center ${newCat.icon === iconKey ? 'text-blue-600 bg-blue-50' : 'text-gray-500'}`}><Icon size={14}/></button>) })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button onClick={handleAdd} className="w-full bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-bold mt-4">Adicionar Categoria</button>
                        </div>

                        <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2">
                            {cats.map(cat => {
                                const resp = members.find(m => m.id === cat.responsibleId);
                                return (
                                <div key={cat.id} className={`bg-white p-3 rounded-xl border transition-all ${editingId === cat.id ? 'border-blue-300 shadow-md ring-1 ring-blue-100' : 'border-gray-200 hover:border-blue-200'}`}>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg bg-${cat.color}-100 text-${cat.color}-700`}>
                                                {React.createElement(ICON_MAP[cat.icon] || Box, { size: 18 })}
                                            </div>
                                            {editingId === cat.id ? (
                                                <input className="font-bold text-sm bg-gray-50 border rounded px-2 py-1" value={cat.title} onChange={e=>handleUpdate(cat.id, 'title', e.target.value)} />
                                            ) : (
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-sm text-gray-800">{cat.title}</span>
                                                    <span className="text-[10px] text-gray-500 flex items-center gap-1">
                                                        {resp ? <><Avatar member={resp} size="w-3 h-3" /> {resp.name}</> : 'Sem responsável'}
                                                        <span className="text-gray-300">|</span> 
                                                        {(cat.subcategories && cat.subcategories.length > 0) ? `${cat.subcategories.length} subcategorias` : 'S/ subcategorias'}
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => setEditingId(editingId === cat.id ? null : cat.id)} className={`p-1.5 rounded ${editingId === cat.id ? 'text-white bg-blue-600 hover:bg-blue-700' : 'text-gray-400 hover:text-blue-500 bg-gray-50'}`}>
                                                {editingId === cat.id ? <Check size={16}/> : <Edit2 size={16}/>}
                                            </button>
                                            <button onClick={() => handleDelete(cat.id)} className="p-1.5 text-gray-400 hover:text-red-500"><Trash2 size={16}/></button>
                                        </div>
                                    </div>
                                    
                                    {editingId === cat.id && (
                                        <div className="mt-4 pt-4 border-t border-gray-100 space-y-6 animate-in">
                                             <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Responsável:</span>
                                                    <select className="w-full p-2 text-sm border rounded-lg bg-gray-50" value={cat.responsibleId || ''} onChange={e=>handleUpdate(cat.id, 'responsibleId', e.target.value)}>
                                                        <option value="">Nenhum</option>
                                                        {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                                    </select>
                                                </div>
                                                <div>
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Fases:</span>
                                                    <div className="flex gap-2 flex-wrap">
                                                        {[{id: 'pre', label: 'Pré'}, {id: 'during', label: 'Durante'}, {id: 'post', label: 'Pós'}].map(phase => {
                                                            const isChecked = (cat.phases || ['pre','during','post']).includes(phase.id);
                                                            return (
                                                                <label key={phase.id} className={`flex items-center gap-1 text-xs px-2 py-1 rounded border cursor-pointer ${isChecked ? 'bg-blue-50 border-blue-200 text-blue-800' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                                                    <input type="checkbox" checked={isChecked} onChange={() => togglePhase(cat.id, phase.id)} className="rounded text-blue-600"/> {phase.label}
                                                                </label>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex gap-4 items-start">
                                                <div>
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Cor:</span>
                                                    <div className="flex gap-1 flex-wrap w-32">
                                                        {PASTEL_COLORS.map(c => (<button key={c.id} onClick={() => handleUpdate(cat.id, 'color', c.id)} className={`w-5 h-5 rounded-full ${c.bg} border-2 ${cat.color === c.id ? 'border-gray-600 scale-110' : 'border-transparent'}`}></button>))}
                                                    </div>
                                                </div>
                                                <div className="flex-1">
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Ícone:</span>
                                                    <div className="grid grid-cols-8 gap-1 bg-gray-50 p-2 rounded-lg border max-h-24 overflow-y-auto">
                                                        {ICON_KEYS.map(iconKey => { const Icon = ICON_MAP[iconKey]; return (<button key={iconKey} onClick={() => handleUpdate(cat.id, 'icon', iconKey)} className={`p-1 rounded flex justify-center ${cat.icon === iconKey ? 'text-blue-600 bg-blue-50' : 'text-gray-400'}`}><Icon size={14}/></button>) })}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* SUBCATEGORIAS */}
                                            <div className="p-4 bg-gray-50 rounded-xl border border-gray-200">
                                                <span className="text-xs font-bold text-gray-700 uppercase block mb-2 flex items-center gap-2"><Layers size={14}/> Subcategorias</span>
                                                <p className="text-[10px] text-gray-500 mb-3">Ex: Dentro de "Utensílios", crie "Confeitaria" ou "Espaço Café".</p>
                                                
                                                <div className="flex gap-2 mb-3">
                                                    <input id={`new-sub-${cat.id}`} className="flex-1 p-2 text-sm border border-gray-300 rounded-lg bg-white outline-none focus:border-blue-500" placeholder="Nome da subcategoria..." onKeyDown={(e) => {
                                                        if(e.key === 'Enter') {
                                                            const input = document.getElementById(`new-sub-${cat.id}`);
                                                            if(input.value.trim()) {
                                                                const newSubs = [...(cat.subcategories || []), { id: Date.now().toString(), title: input.value.trim() }];
                                                                handleUpdate(cat.id, 'subcategories', newSubs);
                                                                input.value = '';
                                                            }
                                                        }
                                                    }}/>
                                                    <button onClick={() => {
                                                        const input = document.getElementById(`new-sub-${cat.id}`);
                                                        if(input.value.trim()) {
                                                            const newSubs = [...(cat.subcategories || []), { id: Date.now().toString(), title: input.value.trim() }];
                                                            handleUpdate(cat.id, 'subcategories', newSubs);
                                                            input.value = '';
                                                        }
                                                    }} className="bg-blue-100 text-blue-700 px-4 rounded-lg font-bold hover:bg-blue-200 transition-colors">Adicionar</button>
                                                </div>

                                                <div className="space-y-1 max-h-40 overflow-y-auto">
                                                    {(cat.subcategories || []).length === 0 && <p className="text-xs text-gray-400 italic text-center py-2">Nenhuma subcategoria criada.</p>}
                                                    {(cat.subcategories || []).map(sub => (
                                                        <div key={sub.id} className="flex justify-between items-center bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                                                            <span className="text-xs font-bold text-gray-700">{sub.title}</span>
                                                            <button onClick={() => {
                                                                handleUpdate(cat.id, 'subcategories', cat.subcategories.filter(s => s.id !== sub.id));
                                                            }} className="text-gray-400 hover:text-red-500 p-1 bg-gray-50 rounded hover:bg-red-50 transition-colors"><Trash2 size={14}/></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                        </div>
                                    )}
                                </div>
                            )})}
                        </div>

                        <div className="mt-6 flex justify-end gap-2 border-t pt-4">
                            <button onClick={onClose} className="px-4 py-2 text-gray-500 text-sm font-bold hover:bg-gray-100 rounded-lg">Cancelar</button>
                            <button onClick={save} className="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-md">Salvar Categorias</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const SettingsModal = ({ isOpen, onClose, members, onUpdateMember, onAddMember, onDeleteMember, onUpdateLogo, currentLogo, managerId, onUpdateManager, onUpdateGeminiKey, currentAppId, onUpdateAppId, managerPassword, onUpdatePassword }) => {
            const [activeTab, setActiveTab] = useState('general');
            const [apiKey, setApiKey] = useState('');
            const [customId, setCustomId] = useState(currentAppId || '');
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [newManagerPassword, setNewManagerPassword] = useState('');
            
            const logoInputRef = useRef(null);
            const memberPhotoInputRef = useRef(null);
            const [newMemberName, setNewMemberName] = useState('');
            const [newMemberEmail, setNewMemberEmail] = useState('');
            const [newMemberRole, setNewMemberRole] = useState('Marketing');
            const [newMemberPassword, setNewMemberPassword] = useState('');
            const [newMemberPhoto, setNewMemberPhoto] = useState(null);
            
            const [editingMemberId, setEditingMemberId] = useState(null);
            const [editName, setEditName] = useState('');
            const [editRole, setEditRole] = useState('');
            const [editEmail, setEditEmail] = useState('');
            const [editPassword, setEditPassword] = useState('');

            useEffect(() => {
                if(isOpen) { setIsUnlocked(false); setPasswordInput(''); setActiveTab('general'); }
            }, [isOpen]);

            const handleLogoUpload = async (e) => { if(e.target.files[0]) { const url = await compressImage(e.target.files[0], 200); onUpdateLogo(url); } };
            const handleNewMemberPhoto = async (e) => { if(e.target.files[0]) { const url = await compressImage(e.target.files[0], 150); setNewMemberPhoto(url); } };
            
            const handleAddMemberAction = () => { 
                if(!newMemberName) { alert("O Nome é obrigatório"); return; }
                onAddMember({ 
                    id: Date.now().toString(), 
                    name: newMemberName, 
                    email: newMemberEmail, 
                    role: newMemberRole, 
                    photoUrl: newMemberPhoto, 
                    password: newMemberPassword,
                    active: true 
                }); 
                setNewMemberName(''); setNewMemberEmail(''); setNewMemberPhoto(null); setNewMemberPassword('');
            };
            
            const handleMemberPhotoUpdate = async (e, memberId) => { if(e.target.files[0]) { const url = await compressImage(e.target.files[0], 150); onUpdateMember(memberId, { photoUrl: url }); } };
            
            const startEditingMember = (member) => { 
                setEditingMemberId(member.id); 
                setEditName(member.name); 
                setEditRole(member.role); 
                setEditEmail(member.email || ''); 
                setEditPassword(member.password || '');
            };
            const saveMember = () => { 
                onUpdateMember(editingMemberId, { name: editName, role: editRole, email: editEmail, password: editPassword }); 
                setEditingMemberId(null); 
            };
            const manager = members.find(m => m.id === managerId) || members[0];
            const handleSaveKey = () => { onUpdateGeminiKey(apiKey); alert("Chave API salva!"); };
            const handleSaveAppId = () => { if(typeof onUpdateAppId === 'function') { onUpdateAppId(customId); alert("ID de Sincronização atualizado! A página irá recarregar."); window.location.reload(); } };
            
            const handleUnlock = () => {
                const actualPassword = managerPassword || '1234';
                if (passwordInput === actualPassword) { setIsUnlocked(true); } else { alert('Senha incorreta!'); }
            };

            const handleUpdateManagerPassword = () => {
                if(newManagerPassword.trim().length > 0) { onUpdatePassword(newManagerPassword); alert("Senha do gestor atualizada!"); setNewManagerPassword(''); }
            };

            const tabs = [ { id: 'general', label: 'Geral', icon: Settings }, { id: 'team', label: 'Equipe', icon: Users }, { id: 'security', label: 'Segurança', icon: ShieldCheck } ];

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Área do Gestor" maxWidth="max-w-5xl">
                    {!isUnlocked ? (
                        <div className="p-12 flex flex-col items-center justify-center space-y-6">
                            <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-2 animate-bounce"><Lock size={40}/></div>
                            <h3 className="text-2xl font-extrabold text-gray-800">Acesso Restrito</h3>
                            <p className="text-sm text-gray-500 text-center max-w-sm">Esta área contém configurações sensíveis do sistema e dados da equipe. Digite a senha de administrador para continuar.</p>
                            <div className="w-full max-w-xs flex gap-2">
                                <input type="password" className="flex-1 p-3 border rounded-xl text-center font-bold tracking-widest outline-none focus:border-blue-500 transition-colors bg-gray-50" placeholder="Senha" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleUnlock()} autoFocus/>
                                <button onClick={handleUnlock} className="bg-blue-900 text-white px-5 rounded-xl font-bold hover:bg-blue-800 transition-colors"><Check size={20}/></button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex h-[600px] overflow-hidden">
                            <div className="w-64 bg-gray-50 border-r border-gray-100 p-4 flex flex-col gap-2">
                                {tabs.map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === tab.id ? 'bg-white text-blue-700 shadow-sm ring-1 ring-gray-100' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-700'}`}><tab.icon size={18}/>{tab.label}</button>
                                ))}
                            </div>

                            <div className="flex-1 p-8 overflow-y-auto bg-white">
                                {activeTab === 'general' && (
                                    <div className="space-y-8 animate-in">
                                        <div>
                                            <h4 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">Configurações Gerais</h4>
                                            <p className="text-sm text-gray-500 mb-6">Personalize a identidade visual e a liderança do painel.</p>
                                            
                                            <div className="space-y-6">
                                                <div className="p-4 border border-gray-100 rounded-2xl bg-gray-50/50">
                                                    <label className="text-xs font-bold text-gray-400 uppercase mb-3 block">Identidade Visual</label>
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-24 h-24 rounded-2xl border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden bg-white relative group">
                                                            {currentLogo ? <img src={currentLogo} className="w-full h-full object-contain"/> : <span className="text-xs text-gray-400 font-bold">LOGO</span>}
                                                            <div className="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center text-white cursor-pointer" onClick={() => logoInputRef.current.click()}><Edit2 size={20}/></div>
                                                        </div>
                                                        <div>
                                                            <p className="text-sm font-bold text-gray-800 mb-1">Logotipo do Sistema</p>
                                                            <p className="text-xs text-gray-500 mb-3">Recomendado: PNG Transparente</p>
                                                            <button onClick={() => logoInputRef.current.click()} className="text-xs bg-white border border-gray-200 px-4 py-2 rounded-lg font-bold hover:bg-gray-50 text-blue-600 transition-colors">Alterar Imagem</button>
                                                            <input type="file" ref={logoInputRef} className="hidden" accept="image/*" onChange={handleLogoUpload}/>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="p-4 border border-gray-100 rounded-2xl bg-gray-50/50">
                                                    <label className="text-xs font-bold text-gray-400 uppercase mb-3 block">Liderança</label>
                                                    <div className="flex items-center justify-between gap-4">
                                                        <div className="flex items-center gap-3"><Avatar member={manager} size="w-12 h-12"/><div><p className="text-sm font-bold text-gray-900">{manager?.name}</p><p className="text-xs text-gray-500">Gestor Atual</p></div></div>
                                                        <select className="text-xs p-2 border rounded-lg bg-white outline-none focus:border-blue-500" value={managerId} onChange={(e) => onUpdateManager(e.target.value)}>
                                                            {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'team' && (
                                    <div className="space-y-6 animate-in">
                                        <div className="flex justify-between items-end">
                                            <div><h4 className="text-lg font-bold text-gray-800 mb-1">Membros da Equipe</h4><p className="text-sm text-gray-500">Gerencie quem tem acesso e senhas de perfis.</p></div>
                                        </div>

                                        <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex flex-col gap-3">
                                            <div className="flex gap-4 items-start">
                                                <div className="flex flex-col items-center gap-2">
                                                    <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center cursor-pointer hover:bg-gray-50 border border-blue-100 overflow-hidden shadow-sm" onClick={() => memberPhotoInputRef.current.click()}>
                                                        {newMemberPhoto ? <img src={newMemberPhoto} className="w-full h-full object-cover"/> : <Camera size={20} className="text-blue-300"/>}
                                                    </div>
                                                    <span className="text-[9px] text-blue-400 font-bold">FOTO</span>
                                                    <input type="file" ref={memberPhotoInputRef} className="hidden" accept="image/*" onChange={handleNewMemberPhoto}/>
                                                </div>
                                                <div className="flex-1 grid grid-cols-1 md:grid-cols-4 gap-3">
                                                    <div><label className="text-[10px] font-bold text-blue-400 uppercase mb-1 block">Nome *</label><input className="w-full p-2 text-sm border border-blue-200 rounded-lg outline-none focus:border-blue-500" placeholder="Ex: João" value={newMemberName} onChange={e=>setNewMemberName(e.target.value)}/></div>
                                                    <div><label className="text-[10px] font-bold text-blue-400 uppercase mb-1 block">E-mail</label><input type="email" className="w-full p-2 text-sm border border-blue-200 rounded-lg outline-none focus:border-blue-500" placeholder="joao@empresa.com" value={newMemberEmail} onChange={e=>setNewMemberEmail(e.target.value)}/></div>
                                                    <div><label className="text-[10px] font-bold text-blue-400 uppercase mb-1 block">Função</label><input className="w-full p-2 text-sm border border-blue-200 rounded-lg outline-none focus:border-blue-500" placeholder="Ex: Marketing" value={newMemberRole} onChange={e=>setNewRole(e.target.value)}/></div>
                                                    <div><label className="text-[10px] font-bold text-blue-400 uppercase mb-1 block">Senha (Opcional)</label><input type="text" className="w-full p-2 text-sm border border-blue-200 rounded-lg outline-none focus:border-blue-500" placeholder="Ex: 1234" value={newMemberPassword} onChange={e=>setNewMemberPassword(e.target.value)}/></div>
                                                </div>
                                            </div>
                                            <button onClick={handleAddMemberAction} className="w-full h-10 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-sm shadow-blue-200">Adicionar Membro</button>
                                        </div>

                                        <div className="space-y-3">
                                            {members.map(m => (
                                                <div key={m.id} className="flex justify-between items-center p-3 border rounded-xl transition-all bg-white border-gray-100 hover:shadow-sm">
                                                    <div className="flex items-center gap-4 w-full mr-4">
                                                        <div className="relative group cursor-pointer shrink-0">
                                                            <Avatar member={m}/>
                                                            <div className="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-white"><Camera size={14}/></div>
                                                            <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" onChange={(e) => handleMemberPhotoUpdate(e, m.id)}/>
                                                        </div>
                                                        <div className="flex-1">
                                                            {editingMemberId === m.id ? (
                                                                <div className="flex flex-col gap-2 w-full">
                                                                    <div className="flex items-center gap-2">
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="Nome" value={editName} onChange={e=>setEditName(e.target.value)} autoFocus/>
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="E-mail" value={editEmail} onChange={e=>setEditEmail(e.target.value)}/>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="Função" value={editRole} onChange={e=>setEditRole(e.target.value)}/>
                                                                        <input className="border border-blue-200 p-1.5 text-sm rounded-lg flex-1 focus:border-blue-500 outline-none" placeholder="Senha de Acesso" value={editPassword} onChange={e=>setEditPassword(e.target.value)}/>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div>
                                                                    <p className="text-sm font-bold text-gray-800 flex items-center gap-2">
                                                                        {m.name} 
                                                                        {m.role === 'Temporário' && <span className="bg-amber-100 text-amber-700 text-[9px] px-1.5 py-0.5 rounded uppercase font-bold">Temp</span>}
                                                                    </p>
                                                                    <div className="text-[10px] mt-1 space-y-1">
                                                                        <p className="text-gray-500">{m.email || 'Sem e-mail'} • {m.role}</p>
                                                                        {m.password ? (
                                                                            <p className="flex items-center gap-1 text-emerald-700 font-bold bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded w-fit">
                                                                                <Lock size={10}/> Senha: {m.password}
                                                                            </p>
                                                                        ) : (
                                                                            <p className="text-gray-400 italic">Sem senha (acesso livre)</p>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 shrink-0">
                                                        {editingMemberId === m.id ? 
                                                            <button onClick={saveMember} className="w-8 h-8 flex items-center justify-center bg-green-50 text-green-600 rounded-lg hover:bg-green-100"><Check size={16}/></button> : 
                                                            <button onClick={() => startEditingMember(m)} className="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg"><Edit2 size={16}/></button>
                                                        }
                                                        <button onClick={() => onDeleteMember(m.id)} className="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-gray-300 hover:text-red-500 hover:bg-red-50" title="Excluir Definitivamente">
                                                            <Trash2 size={16}/>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'security' && (
                                    <div className="space-y-8 animate-in">
                                        <div>
                                            <h4 className="text-lg font-bold text-gray-800 mb-4">Segurança & Sistema</h4>
                                            <p className="text-sm text-gray-500 mb-6">Controle de acesso e integrações.</p>
                                        
                                            <div className="space-y-6">
                                                <div className="p-5 border border-amber-200 bg-amber-50 rounded-2xl">
                                                    <div className="flex items-start gap-3 mb-4"><div className="p-2 bg-amber-100 rounded-lg text-amber-600"><Lock size={20}/></div><div><h5 className="font-bold text-amber-900 text-sm">Senha do Gestor</h5><p className="text-xs text-amber-700/70">Senha usada para acessar esta área restrita.</p></div></div>
                                                    <div className="flex gap-2"><input type="password" value={newManagerPassword} onChange={e=>setNewManagerPassword(e.target.value)} className="flex-1 p-2.5 text-sm border border-amber-200 rounded-xl bg-white outline-none focus:ring-2 focus:ring-amber-200" placeholder="Nova senha..."/><button onClick={handleUpdateManagerPassword} className="bg-amber-600 text-white px-4 rounded-xl text-xs font-bold hover:bg-amber-700 shadow-sm">Atualizar</button></div>
                                                </div>

                                                <div className="p-5 border border-gray-100 bg-white rounded-2xl shadow-sm">
                                                    <div className="flex items-start gap-3 mb-4"><div className="p-2 bg-purple-100 rounded-lg text-purple-600"><Sparkles size={20}/></div><div><h5 className="font-bold text-gray-800 text-sm">Inteligência Artificial (Gemini)</h5><p className="text-xs text-gray-500">Chave da API para o assistente virtual.</p></div></div>
                                                    <div className="flex gap-2"><input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} className="flex-1 p-2.5 text-sm border rounded-xl outline-none focus:border-purple-500 bg-gray-50" placeholder="Cole sua API Key aqui..."/><button onClick={handleSaveKey} className="bg-purple-600 text-white px-4 rounded-xl text-xs font-bold hover:bg-purple-700 shadow-sm">Salvar</button></div>
                                                </div>

                                                <div className="p-5 border border-gray-100 bg-white rounded-2xl shadow-sm">
                                                    <div className="flex items-start gap-3 mb-4"><div className="p-2 bg-blue-100 rounded-lg text-blue-600"><Database size={20}/></div><div><h5 className="font-bold text-gray-800 text-sm">Sincronização de Dados</h5><p className="text-xs text-gray-500">ID único para compartilhar dados entre dispositivos.</p></div></div>
                                                    <div className="flex gap-2"><input type="text" value={customId} onChange={e=>setCustomId(e.target.value)} className="flex-1 p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-gray-50 font-mono text-gray-600" placeholder="ID da Aplicação"/><button onClick={handleSaveAppId} className="bg-blue-900 text-white px-4 rounded-xl text-xs font-bold hover:bg-blue-800 shadow-sm">Conectar</button></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </Modal>
            );
        };

        const TaskDetailModal = ({ isOpen, onClose, task, members, categories, dbOperations, deleteTask, currentUser, createNotification }) => {
            const [messageText, setMessageText] = useState("");
            const [chatAttachment, setChatAttachment] = useState(null);
            const [newSubtask, setNewSubtask] = useState("");
            const [showEmojis, setShowEmojis] = useState(false);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editingText, setEditingText] = useState("");

            const [isTransferring, setIsTransferring] = useState(false);
            const [transferTargetId, setTransferTargetId] = useState('');
            const [transferReason, setTransferReason] = useState('');

            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            const currentTask = task; 

            if (!isOpen || !currentTask) return null;

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [currentTask.messages]);

            const handleSendMessage = () => {
                if (!messageText.trim() && !chatAttachment) return;
                
                const sender = currentUser || members[0]; 
                
                const newMessage = {
                    id: Date.now(),
                    senderId: sender.id,
                    senderName: sender.name,
                    text: messageText,
                    image: chatAttachment,
                    timestamp: new Date().toISOString()
                };
                
                const updatedMessages = [...(currentTask.messages || []), newMessage];
                dbOperations.updateTask(currentTask.id, { messages: updatedMessages });
                
                const mentions = members.filter(m => messageText.includes(`@${m.name.split(' ')[0]}`) || messageText.includes(`@${m.name}`));
                mentions.forEach(m => {
                    if (m.id !== sender.id) {
                        createNotification({
                            userId: m.id, title: "Menção no Chat", 
                            text: `${sender.name} mencionou você na tarefa "${currentTask.text}".`,
                            taskId: currentTask.id, read: false, createdAt: new Date().toISOString()
                        });
                    }
                });

                if (currentTask.responsible && currentTask.responsible.id !== sender.id && !mentions.some(m => m.id === currentTask.responsible.id)) {
                    createNotification({
                        userId: currentTask.responsible.id, title: "Nova Mensagem na Tarefa",
                        text: `${sender.name} comentou na sua tarefa "${currentTask.text}".`,
                        taskId: currentTask.id, read: false, createdAt: new Date().toISOString()
                    });
                }

                setMessageText("");
                setChatAttachment(null);
            };

            const handleStartEditing = (msg) => { setEditingMessageId(msg.id); setEditingText(msg.text); };
            const handleCancelEditing = () => { setEditingMessageId(null); setEditingText(""); };

            const handleSaveEdit = (msgId) => {
                if (!editingText.trim()) return; 
                const updatedMessages = currentTask.messages.map(m => m.id === msgId ? { ...m, text: editingText, editedAt: new Date().toISOString() } : m);
                dbOperations.updateTask(currentTask.id, { messages: updatedMessages });
                setEditingMessageId(null); setEditingText("");
            };

            const formatEditedDate = (isoDate) => {
                if (!isoDate) return "";
                const date = new Date(isoDate); const today = new Date();
                const isToday = date.toDateString() === today.toDateString();
                const timeStr = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                return isToday ? `Editado às ${timeStr}` : `Editado em ${date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' })} às ${timeStr}`;
            };

            const handleAddSubtask = () => {
                if (!newSubtask.trim()) return;
                const newSub = { id: Date.now(), text: newSubtask, completed: false };
                dbOperations.updateTask(currentTask.id, { subtasks: [...(currentTask.subtasks || []), newSub] });
                setNewSubtask("");
            };

            const toggleSubtask = (subId) => {
                const updatedSubtasks = currentTask.subtasks.map(s => s.id === subId ? { ...s, completed: !s.completed } : s);
                dbOperations.updateTask(currentTask.id, { subtasks: updatedSubtasks });
            };

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (file) { const url = await compressImage(file, 400); setChatAttachment(url); }
            };
            const addEmoji = (emoji) => { setMessageText(prev => prev + emoji); setShowEmojis(false); };

            const toggleSupport = (memberId) => {
                const currentSupport = currentTask.support || [];
                const newSupport = currentSupport.some(m => m.id === memberId) ? currentSupport.filter(m => m.id !== memberId) : [...currentSupport, members.find(m => m.id === memberId)];
                dbOperations.updateTask(currentTask.id, { support: newSupport });
            };

            const handleDeleteTask = () => { if(confirm("Tem a certeza que deseja excluir esta tarefa?")) { deleteTask(currentTask.id); onClose(); } };

            const confirmTransfer = () => {
                if (!transferTargetId) { alert("Por favor, selecione o novo responsável."); return; }
                if (!transferReason.trim()) { alert("Por favor, preencha o motivo da transferência."); return; }
                const newResponsible = members.find(m => m.id === transferTargetId);
                const sender = currentUser || members[0];

                const historyEntry = {
                    date: new Date().toISOString(),
                    from: currentTask.responsible || null,
                    to: newResponsible || null,
                    reason: transferReason,
                    by: sender
                };

                dbOperations.updateTask(currentTask.id, {
                    responsible: newResponsible || null,
                    transferHistory: [...(currentTask.transferHistory || []), historyEntry]
                });

                if (newResponsible) {
                    createNotification({
                        userId: newResponsible.id,
                        title: "Tarefa Transferida",
                        text: `${sender.name} transferiu a tarefa "${currentTask.text}" para você. Motivo: ${transferReason}`,
                        taskId: currentTask.id,
                        read: false,
                        createdAt: new Date().toISOString()
                    });
                }

                setIsTransferring(false);
            };

            const activeCategory = categories.find(c => c.id === currentTask.category);

            return (

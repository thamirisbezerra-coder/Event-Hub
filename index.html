                                                        {colTasks.length === 0 && <p className="text-sm text-gray-400 italic text-center py-6 border-2 border-dashed border-gray-200 rounded-xl bg-white">Nenhuma tarefa nesta categoria.<br/>Arraste tarefas para cá ou crie novas.</p>}
                                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                                                            {colTasks.map(task => (
                                                                <div key={task.id} draggable onDragStart={(e) => handleDragStart(e, task)} onDrop={(e) => handleDrop(e, col.id, 'task', task.order || 0)} onClick={() => { setSelectedTaskId(task.id); setIsTaskModalOpen(true); }} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:shadow-md cursor-pointer group relative hover:border-blue-400 transition-all transform hover:-translate-y-0.5">
                                                                    <div className="flex justify-between items-start mb-2"><FlagPriority level={task.priority} onClick={()=>cyclePriority(task)}/><div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button className="text-gray-400 hover:text-blue-600 bg-gray-50 p-1 rounded-md"><Edit2 size={12}/></button></div></div>
                                                                    <p className="text-sm font-semibold text-gray-800 mb-4 line-clamp-3 leading-snug">{task.text}</p>
                                                                    <div className="flex items-center justify-between pt-3 border-t border-gray-50">
                                                                        <div className="flex items-center gap-2 bg-gray-50 px-2 py-1 rounded-md"><Avatar member={task.responsible} size="w-5 h-5"/><span className="text-[10px] font-bold text-gray-600">{task.responsible?.name.split(' ')[0]}</span></div>
                                                                        {task.cost > 0 && <span className="text-[10px] font-bold text-emerald-700 bg-emerald-100 px-1.5 py-0.5 rounded-md border border-emerald-200">{formatCurrency(task.cost)}</span>}
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    }

                                    // STATUS VIEW
                                    return (
                                        <div key={col.id} className="min-w-[320px] w-80 shrink-0 bg-gray-100/60 rounded-2xl p-3 border border-gray-200 flex flex-col shadow-sm" onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, col.id, 'column')}>
                                            <div className="flex items-center justify-between px-2 py-1 mb-3">
                                                <span className={`text-xs font-bold uppercase flex items-center gap-2 ${col.color ? `text-${col.color}-700` : 'text-gray-700'}`}>{col.icon && React.createElement(ICON_MAP[col.icon] || Box, { size: 16 })} {col.title}</span>
                                                <span className="bg-white text-gray-500 text-[10px] font-bold px-2 py-0.5 rounded-md border shadow-sm">{colTasks.length}</span>
                                            </div>
                                            <div className="space-y-3 flex-1 min-h-[150px]">
                                                {colTasks.length === 0 && <div className="h-full flex items-center justify-center border-2 border-dashed border-gray-300 rounded-xl text-xs text-gray-400 font-medium py-8 bg-gray-50/50">Solte as tarefas aqui</div>}
                                                {colTasks.map(task => (
                                                    <div key={task.id} draggable onDragStart={(e) => handleDragStart(e, task)} onDrop={(e) => handleDrop(e, col.id, 'task', task.order || 0)} onClick={() => { setSelectedTaskId(task.id); setIsTaskModalOpen(true); }} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:shadow-md cursor-pointer group relative hover:border-blue-400 transition-all transform hover:-translate-y-0.5">
                                                        <div className="flex justify-between items-start mb-2"><FlagPriority level={task.priority} onClick={()=>cyclePriority(task)}/><div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button className="text-gray-400 hover:text-blue-600 bg-gray-50 p-1 rounded-md"><Edit2 size={12}/></button></div></div>
                                                        <p className="text-sm font-semibold text-gray-800 mb-4 line-clamp-3 leading-snug">{task.text}</p>
                                                        <div className="flex items-center justify-between pt-3 border-t border-gray-50">
                                                            <div className="flex items-center gap-2 bg-gray-50 px-2 py-1 rounded-md"><Avatar member={task.responsible} size="w-5 h-5"/><span className="text-[10px] font-bold text-gray-600">{task.responsible?.name.split(' ')[0]}</span></div>
                                                            {task.cost > 0 && <span className="text-[10px] font-bold text-emerald-700 bg-emerald-100 px-1.5 py-0.5 rounded-md border border-emerald-200">{formatCurrency(task.cost)}</span>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                                <div className="min-w-[20px] shrink-0"></div>
                            </div>
                        </div>
                    </div>
                    {selectedTask && <TaskDetailModal isOpen={isTaskModalOpen} onClose={() => { setIsTaskModalOpen(false); setSelectedTaskId(null); }} task={selectedTask} members={members} dbOperations={{ updateTask: (id, updates) => onUpdateTask(id, updates) }} deleteTask={onDeleteTask} currentUser={currentUser} createNotification={createNotification}/>}
                    <EditEventModal isOpen={isEditEventOpen} onClose={() => setIsEditEventOpen(false)} event={event} onUpdate={onUpdateEvent} members={members} onDelete={onDeleteEvent} />
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('dashboard');
            const [selectedEvent, setSelectedEvent] = useState(null);
            
            // Firebase States
            const [events, setEvents] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [members, setMembers] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [user, setUser] = useState(null);
            const [needsAuth, setNeedsAuth] = useState(false);
            
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [isNewEventOpen, setIsNewEventOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isCatSettingsOpen, setIsCatSettingsOpen] = useState(false);
            const [isNewTaskOpen, setIsNewTaskOpen] = useState(false);
            const [isAIOpen, setIsAIOpen] = useState(false);
            const [selectedWorkloadMember, setSelectedWorkloadMember] = useState(null);
            const [logo, setLogo] = useState(null);
            const [managerId, setManagerId] = useState('1'); 
            const [geminiKey, setGeminiKey] = useState('');
            const [managerPassword, setManagerPassword] = useState('1234');

            // 1. Inicia Auth
            useEffect(() => {
                if (!app) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            // Se não tiver token, a UI de login via Google aparecerá via onAuthStateChanged
                        }
                    } catch (e) { console.error("Auth falhou:", e); }
                };
                initAuth();

                return onAuthStateChanged(auth, (u) => {
                    if (u) { setUser(u); setNeedsAuth(false); } 
                    else { setUser(null); setNeedsAuth(true); }
                });
            }, []);

            // Login Google
            const handleGoogleLogin = async () => {
                const provider = new GoogleAuthProvider();
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (DOMINIO_PERMITIDO && !result.user.email.endsWith(DOMINIO_PERMITIDO)) {
                        await signOut(auth);
                        alert(`Acesso negado. Apenas e-mails do domínio ${DOMINIO_PERMITIDO} são permitidos.`);
                        return;
                    }
                    // OK, logado com sucesso!
                } catch (error) {
                    console.error("Erro Google Login:", error);
                    if(error.code !== 'auth/popup-closed-by-user') alert("Erro ao fazer login com Google.");
                }
            };

            // Garante que o Google User existe nos Members (Auto-Create se bater domínio)
            useEffect(() => {
                if(user && members.length > 0 && !members.find(m => m.email === user.email) && user.email) {
                    handleAddMember({
                        id: Date.now().toString(),
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        role: 'Membro',
                        photoUrl: user.photoURL,
                        active: true
                    });
                }
            }, [user, members]);

            const currentUserMember = members.find(m => m.email === user?.email) || null;

            // 2. Subscreve ao Firestore apenas se logado
            useEffect(() => {
                if(!user || !db) return;

                const unsubEvents = onSnapshot(getColPath('events'), (snap) => {
                    if (snap.empty && !localStorage.getItem('db_initialized')) {
                        INITIAL_MEMBERS.forEach(m => setDoc(getDocPath('members', m.id), m));
                        setDoc(getDocPath('config', 'main'), { managerId: '1', managerPassword: '1234' });
                        localStorage.setItem('db_initialized', 'true');
                    } else { setEvents(snap.docs.map(d => d.data())); }
                });
                const unsubTasks = onSnapshot(getColPath('tasks'), (snap) => setTasks(snap.docs.map(d => d.data())));
                const unsubMembers = onSnapshot(getColPath('members'), (snap) => setMembers(snap.docs.map(d => d.data())));
                const unsubSettings = onSnapshot(getDocPath('config', 'main'), (snap) => {
                    if(snap.exists()) {
                        const data = snap.data();
                        if(data.logo) setLogo(data.logo); if(data.managerId) setManagerId(data.managerId);
                        if(data.geminiKey) setGeminiKey(data.geminiKey); if(data.managerPassword) setManagerPassword(data.managerPassword);
                    }
                });
                const unsubNotifications = onSnapshot(getColPath('notifications'), (snap) => {
                    setNotifications(snap.docs.map(d => d.data()));
                });

                return () => { unsubEvents(); unsubTasks(); unsubMembers(); unsubSettings(); unsubNotifications(); };
            }, [user]);

            // --- Handlers Firestore ---
            const handleUpdateTask = (id, updates) => updateDoc(getDocPath('tasks', id), updates);
            const handleDeleteTask = (id) => deleteDoc(getDocPath('tasks', id));
            const handleCreateTask = (newTask) => {
                 setDoc(getDocPath('tasks', newTask.id), newTask);
                 // Notifica responsável (se for novo e diferente do criador)
                 if (newTask.responsible && newTask.responsible.id !== currentUserMember?.id) {
                     handleCreateNotification({
                         userId: newTask.responsible.id,
                         title: "Nova Tarefa Atribuída",
                         text: `${currentUserMember?.name || 'Alguém'} te atribuiu a tarefa "${newTask.text}".`,
                         taskId: newTask.id,
                         read: false,
                         createdAt: new Date().toISOString()
                     });
                 }
            };
            const handleUpdateEvent = (id, updates) => updateDoc(getDocPath('events', id), updates);
            const handleCreateEvent = (newEvent, newTasks) => { setDoc(getDocPath('events', newEvent.id), newEvent); newTasks.forEach(t => setDoc(getDocPath('tasks', t.id), t)); };
            const handleDeleteEvent = (eventId) => {
                if(confirm("Tem certeza que deseja excluir este evento e todas as suas tarefas?")) {
                    deleteDoc(getDocPath('events', eventId));
                    tasks.filter(t => t.eventId === eventId).forEach(t => deleteDoc(getDocPath('tasks', t.id)));
                    setView('dashboard'); setSelectedEvent(null);
                }
            };
            const handleUpdateMember = (id, updates) => updateDoc(getDocPath('members', id), updates);
            const handleAddMember = (newMember) => setDoc(getDocPath('members', newMember.id), newMember);
            
            const handleCreateNotification = (notif) => {
                const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                setDoc(getDocPath('notifications', id), { id, ...notif });
            };
            const handleMarkAsReadNotification = (id) => updateDoc(getDocPath('notifications', id), { read: true });
            const handleClearAllNotifications = () => {
                // Delete all notifications for current user
                notifications.filter(n => n.userId === currentUserMember?.id).forEach(n => deleteDoc(getDocPath('notifications', n.id)));
            };

            const handleUpdateLogo = (url) => setDoc(getDocPath('config', 'main'), { logo: url }, { merge: true });
            const handleUpdateManager = (id) => setDoc(getDocPath('config', 'main'), { managerId: id }, { merge: true });
            const handleUpdateGeminiKey = (key) => setDoc(getDocPath('config', 'main'), { geminiKey: key }, { merge: true });
            const handleUpdatePassword = (pass) => setDoc(getDocPath('config', 'main'), { managerPassword: pass }, { merge: true });
            const handleUpdateAppId = (newId) => { if(newId && newId.trim()) { localStorage.setItem('event_hub_custom_app_id', newId.trim()); } else { localStorage.removeItem('event_hub_custom_app_id'); } };
            
            const handleGlobalAddAgenda = (type, item) => {
                if(item.eventId) { const evt = events.find(e => e.id === item.eventId); if(evt) handleUpdateEvent(evt.id, { agenda: [...(evt.agenda||[]), item] }); } 
                else if (events.length > 0) { const evt = events[0]; handleUpdateEvent(evt.id, { agenda: [...(evt.agenda||[]), item] }); }
            };
            const handleGlobalDeleteAgenda = (id) => { const evt = events.find(e => (e.agenda || []).some(a => a.id === id)); if (evt) handleUpdateEvent(evt.id, { agenda: evt.agenda.filter(a => a.id !== id) }); };
            const handleGlobalUpdateAgenda = (id, newItem) => { const evt = events.find(e => (e.agenda || []).some(a => a.id === id)); if (evt) handleUpdateEvent(evt.id, { agenda: evt.agenda.map(a => a.id === id ? { ...a, ...newItem } : a) }); };
            
            const handleUpdateEventCategories = (newCats) => { if(selectedEvent) { handleUpdateEvent(selectedEvent.id, { categories: newCats }); setSelectedEvent(prev => ({ ...prev, categories: newCats })); } };
            const handleAddTeamMember = (eventId, memberId) => { const event = events.find(e => e.id === eventId); if (event && !event.teamIds?.includes(memberId)) handleUpdateEvent(eventId, { teamIds: [...(event.teamIds || []), memberId] }); };
            const handleRemoveTeamMember = (eventId, memberId) => { const event = events.find(e => e.id === eventId); if(event) handleUpdateEvent(eventId, { teamIds: (event.teamIds || []).filter(id => id !== memberId) }); };

            const currentSelectedEvent = selectedEvent ? events.find(e => e.id === selectedEvent.id) : null;

            if (needsAuth) { return <LoginScreen onGoogleLogin={handleGoogleLogin} />; }
            if (!currentUserMember && members.length > 0) {
                // Estado transitório onde logou mas ainda não está sincronizado nos membros
                return <div className="min-h-screen flex items-center justify-center bg-gray-50"><p className="text-gray-500 font-bold animate-pulse">Sincronizando perfil...</p></div>;
            }

            return (
                <>
                    {view === 'dashboard' && <Dashboard events={events} tasks={tasks} members={members} currentUser={currentUserMember} notifications={notifications} onMarkAsReadNotification={handleMarkAsReadNotification} onClearAllNotifications={handleClearAllNotifications} onSelectEvent={(e) => { setSelectedEvent(e); setView('detail'); }} onNewEvent={() => setIsNewEventOpen(true)} onMemberClick={setSelectedWorkloadMember} onAddAgendaItem={handleGlobalAddAgenda} onDeleteAgendaItem={handleGlobalDeleteAgenda} onUpdateAgendaItem={handleGlobalUpdateAgenda} globalLogo={logo} managerId={managerId}/>}
                    {view === 'detail' && currentSelectedEvent && (
                        <EventDetail 
                            event={currentSelectedEvent} onBack={() => setView('dashboard')} 
                            tasks={tasks} members={members} currentUser={currentUserMember}
                            categories={currentSelectedEvent.categories || DEFAULT_CATEGORIES}
                            onUpdateTask={handleUpdateTask} onUpdateEvent={handleUpdateEvent} onDeleteTask={handleDeleteTask}
                            onOpenCategorySettings={() => setIsCatSettingsOpen(true)} onAddTask={() => setIsNewTaskOpen(true)}
                            onAddTeamMember={handleAddTeamMember} onRemoveTeamMember={handleRemoveTeamMember}
                            onDeleteEvent={handleDeleteEvent} onCreateMember={handleAddMember} createNotification={handleCreateNotification}
                        />
                    )}
                    {view === 'agenda' && <GlobalAgendaView events={events} tasks={tasks} onAddAgendaItem={handleGlobalAddAgenda} onDeleteAgendaItem={handleGlobalDeleteAgenda} onUpdateAgendaItem={handleGlobalUpdateAgenda}/>}
                    {view === 'team' && <GlobalTeamView members={members} onEdit={() => setIsSettingsOpen(true)} />}
                    {view === 'settings' && <SettingsModal isOpen={true} onClose={() => setView('dashboard')} members={members} onUpdateMember={handleUpdateMember} onAddMember={handleAddMember} onUpdateLogo={handleUpdateLogo} currentLogo={logo} managerId={managerId} onUpdateManager={handleUpdateManager} onUpdateGeminiKey={handleUpdateGeminiKey} currentAppId={appId} onUpdateAppId={handleUpdateAppId} managerPassword={managerPassword} onUpdatePassword={handleUpdatePassword}/>}
                    
                    <BottomNav activeTab={view} onChangeTab={(v) => { if(v === 'settings') setIsSettingsOpen(true); else setView(v); }} onAdd={() => setIsNewEventOpen(true)} />
                    
                    <button onClick={() => setIsAIOpen(!isAIOpen)} className="fixed bottom-24 right-6 w-14 h-14 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full shadow-xl shadow-blue-600/30 flex items-center justify-center text-white z-[150] hover:scale-110 transition-transform duration-300 animate-in">
                        {isAIOpen ? <X size={24}/> : <Sparkles size={24}/>}
                    </button>
                    <AIAssistant isOpen={isAIOpen} onClose={() => setIsAIOpen(false)} context={{totalCost: tasks.reduce((a,b)=>a+(b.cost||0),0), tasks, members, events}} apiKey={geminiKey} />

                    <NewEventModal isOpen={isNewEventOpen} onClose={() => setIsNewEventOpen(false)} onCreate={handleCreateEvent} members={members} />
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} members={members} onUpdateMember={handleUpdateMember} onAddMember={handleAddMember} onUpdateLogo={handleUpdateLogo} currentLogo={logo} managerId={managerId} onUpdateManager={handleUpdateManager} onUpdateGeminiKey={handleUpdateGeminiKey} currentAppId={appId} onUpdateAppId={handleUpdateAppId} managerPassword={managerPassword} onUpdatePassword={handleUpdatePassword}/>
                    <WorkloadDetailModal isOpen={!!selectedWorkloadMember} onClose={() => setSelectedWorkloadMember(null)} member={selectedWorkloadMember} memberTasks={tasks.filter(t => t.responsible?.id === selectedWorkloadMember?.id)} allMembers={members} onUpdateTask={handleUpdateTask} />
                    <ManageCategoriesModal isOpen={isCatSettingsOpen} onClose={() => setIsCatSettingsOpen(false)} members={members} categories={currentSelectedEvent?.categories || DEFAULT_CATEGORIES} onUpdateCategories={handleUpdateEventCategories} />
                    {currentSelectedEvent && <NewTaskModal isOpen={isNewTaskOpen} onClose={() => setIsNewTaskOpen(false)} eventId={currentSelectedEvent.id} eventCategories={currentSelectedEvent.categories || DEFAULT_CATEGORIES} onCreate={handleCreateTask} members={members} />}
                </>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = createRoot(rootElement);
            root.render(<App />);
        } else {
            console.error("Root element not found");
        }
    </script>
</body>
</html>
